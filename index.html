<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>새롬부동산 매물관리시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Nanum+Gothic&display=swap" rel="stylesheet">
<!-- Firebase compat -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<!-- 카카오맵 -->
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=f08b63af7ea30749c5105b52cb8828f7&libraries=services"></script>
<style>
:root {
  --bg:#f4f6fb; --surface:#fff; --surface2:#eef1f8; --border:#dde2f0;
  --accent:#3a7ef6; --accent2:#6c47f5; --text:#1a1f36; --text-muted:#7a85a8;
  --danger:#e04a5a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
header{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,0.06);}
.logo{font-family:'Nanum Gothic',sans-serif;font-size:20px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.btn-primary:hover{opacity:0.85;}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger{background:rgba(224,74,90,0.12);color:var(--danger);border:1px solid rgba(224,74,90,0.3);}
.btn-danger:hover{background:rgba(224,74,90,0.22);}
.btn-sm{padding:5px 11px;font-size:12px;}
.container{max-width:1400px;margin:0 auto;padding:24px;}
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
.stat-num{font-size:26px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.stat-label{font-size:12px;color:var(--text-muted);margin-top:4px;}
.filter-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:20px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.search-input,.filter-select{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s;}
.search-input{flex:1;min-width:200px;}
.search-input:focus,.filter-select:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--text-muted);}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead{background:var(--surface2);}
th{padding:12px 14px;text-align:left;color:var(--text-muted);font-weight:500;font-size:12px;white-space:nowrap;border-bottom:1px solid var(--border);}
th[onclick]:hover{color:var(--accent);background:rgba(58,126,246,0.05);}
td{padding:11px 14px;border-bottom:1px solid rgba(221,226,240,0.6);vertical-align:middle;white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(58,126,246,0.03);}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;}
.tag-매매{background:rgba(58,126,246,0.15);color:#3a7ef6;}
.tag-전세{background:rgba(108,71,245,0.15);color:#6c47f5;}
.tag-월세{background:rgba(240,160,48,0.15);color:#f0a030;}
.tag-토지{background:rgba(46,171,122,0.15);color:#2eab7a;}
.tag-공장창고{background:rgba(224,104,48,0.15);color:#e06830;}
.tag-상가{background:rgba(224,74,90,0.15);color:#e04a5a;}
.tag-아파트{background:rgba(58,126,246,0.15);color:#3a7ef6;}
.tag-빌라{background:rgba(108,71,245,0.15);color:#6c47f5;}
.tag-원투룸{background:rgba(32,170,200,0.15);color:#20aac8;}
.table-thumb{width:36px;height:36px;border-radius:6px;object-fit:cover;border:1px solid var(--border);}
.action-btns{display:flex;gap:5px;}
.muted{color:var(--text-muted);}
.address-text{max-width:180px;overflow:hidden;text-overflow:ellipsis;}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
.empty-icon{font-size:48px;margin-bottom:12px;}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.active{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;animation:modalIn 0.22s ease;}
@keyframes modalIn{from{opacity:0;transform:translateY(18px) scale(0.97)}to{opacity:1;transform:none}}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:16px;font-weight:700;}
.modal-close{background:none;border:none;color:var(--text-muted);font-size:22px;cursor:pointer;line-height:1;padding:4px;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:20px 24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group.full{grid-column:1/-1;}
label{font-size:12px;color:var(--text-muted);font-weight:500;}
.form-input,.form-select,.form-textarea{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s;width:100%;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);}
.form-input::placeholder,.form-textarea::placeholder{color:var(--text-muted);}
.form-textarea{resize:vertical;min-height:80px;}
/* Detail */
.detail-section{margin-bottom:20px;}
.detail-section-title{font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.detail-item label{display:block;font-size:11px;color:var(--text-muted);margin-bottom:3px;}
.detail-item .val{font-size:14px;font-weight:500;}
.detail-item.full{grid-column:1/-1;}
/* Photo */
.photo-upload-area{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all 0.2s;color:var(--text-muted);font-size:13px;}
.photo-upload-area:hover,.photo-upload-area.drag-over{border-color:var(--accent);background:rgba(58,126,246,0.04);color:var(--accent);}
.photo-upload-area .upload-icon{font-size:28px;margin-bottom:6px;}
.photo-preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-top:10px;}
.photo-thumb-wrap{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;border:1px solid var(--border);background:var(--bg);}
.photo-thumb-wrap img{width:100%;height:100%;object-fit:cover;}
.photo-thumb-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.detail-photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-top:4px;}
/* Lightbox */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:500;align-items:center;justify-content:center;flex-direction:column;}
.lightbox.active{display:flex;}
.lightbox img{max-width:90vw;max-height:80vh;border-radius:8px;object-fit:contain;}
.lightbox-close{position:absolute;top:18px;right:22px;background:none;border:none;color:#fff;font-size:32px;cursor:pointer;}
.lightbox-nav{display:flex;gap:12px;margin-top:16px;align-items:center;}
.lightbox-nav button{background:rgba(255,255,255,0.15);border:none;color:#fff;border-radius:8px;padding:8px 20px;cursor:pointer;font-size:18px;}
.lightbox-nav button:hover{background:rgba(255,255,255,0.25);}
.lightbox-counter{color:rgba(255,255,255,0.5);font-size:13px;margin-top:10px;}
#kakaoMap{width:100%;height:250px;border-radius:10px;border:1px solid var(--border);margin-top:4px;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
@media(max-width:768px){.container{padding:16px;}.header-actions{gap:6px;}.form-grid{grid-template-columns:1fr;}.detail-grid{grid-template-columns:1fr;}}
/* 컬럼 리사이즈 */
th{position:relative;}
.col-resizer{position:absolute;right:0;top:0;height:100%;width:6px;cursor:col-resize;user-select:none;z-index:1;}
.col-resizer:hover,.col-resizer.dragging{background:var(--accent);opacity:0.5;}
/* 전체지도 */
#mapAllModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:300;align-items:center;justify-content:center;padding:20px;}
#mapAllModal.active{display:flex;}
#mapAllModal .modal{max-width:900px;width:100%;}
#mapAll{width:100%;height:60vh;border-radius:10px;border:1px solid var(--border);}
.map-marker-info{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 14px;min-width:180px;font-family:'Noto Sans KR',sans-serif;font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,0.12);}
.map-marker-info .mi-title{font-weight:700;color:var(--accent);margin-bottom:4px;}
.map-marker-info .mi-addr{color:var(--text);margin-bottom:2px;}
.map-marker-info .mi-price{color:var(--danger);font-weight:600;}
/* 상세모달은 전체지도 위에 표시 */
#detailModal{z-index:500;}
</style>
</head>
<body>

<header>
  <div class="logo">새롬부동산 매물관리시스템</div>
  <div class="header-actions">
    <button class="btn btn-outline" onclick="togglePCView()">🖥 PC버전</button>
    <button class="btn btn-outline" onclick="openMapAll()">🗺 전체 지도</button>
    <button class="btn btn-outline" onclick="document.getElementById('excelUpload').click()">📤 엑셀 업로드</button>
    <input type="file" id="excelUpload" accept=".csv" style="display:none" onchange="uploadExcel(event)">
    <button class="btn btn-outline" onclick="downloadExcel()">📥 엑셀 다운로드</button>
    <button class="btn btn-primary" onclick="openAddModal()">＋ 매물 등록</button>
  </div>
</header>

<div class="container">
  <div class="stats-bar" id="statsBar"></div>
  <div class="filter-bar">
    <input class="search-input" type="text" placeholder="🔍  주소, 특이사항, 소유자 검색..." id="searchInput" oninput="renderTable()">
    <select class="filter-select" id="filterGeorae" onchange="renderTable()">
      <option value="">거래유형 전체</option>
      <option>매매</option><option>전세</option><option>월세</option>
    </select>
    <select class="filter-select" id="filterType" onchange="renderTable()">
      <option value="">매물종류 전체</option>
      <option>토지</option><option>공장창고</option><option>상가</option>
      <option>아파트</option><option>빌라</option><option>원투룸</option>
    </select>
    <button class="btn btn-outline btn-sm" onclick="resetFilters()">초기화</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortTable('propNo')" style="cursor:pointer">No. <span id="sort_propNo"></span></th>
          <th>사진</th>
          <th onclick="sortTable('georae')" style="cursor:pointer">거래 <span id="sort_georae"></span></th>
          <th onclick="sortTable('type')" style="cursor:pointer">종류 <span id="sort_type"></span></th>
          <th onclick="sortTable('address')" style="cursor:pointer;min-width:120px;width:200px" id="thAddress">주소 <span id="sort_address"></span><div class="col-resizer" id="addressResizer" onclick="event.stopPropagation()"></div></th>
          <th onclick="sortTable('price')" style="cursor:pointer">가격 <span id="sort_price"></span></th>
          <th onclick="sortTable('landArea')" style="cursor:pointer">토지면적 <span id="sort_landArea"></span></th>
          <th onclick="sortTable('totalArea')" style="cursor:pointer">연면적 <span id="sort_totalArea"></span></th>
          <th onclick="sortTable('useZone')" style="cursor:pointer">용도지역 <span id="sort_useZone"></span></th>
          <th onclick="sortTable('jimok')" style="cursor:pointer">지목 <span id="sort_jimok"></span></th>
          <th onclick="sortTable('ownerName')" style="cursor:pointer">소유자 <span id="sort_ownerName"></span></th>
          <th onclick="sortTable('createdDate')" style="cursor:pointer">등록일시 <span id="sort_createdDate"></span></th>
          <th>관리</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div id="emptyState" class="empty-state" style="display:none">
      <div class="empty-icon">🏠</div>
      <p>등록된 매물이 없습니다.</p>
    </div>
  </div>
</div>

<!-- 등록/수정 모달 -->
<div class="modal-overlay" id="formModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="formModalTitle">매물 등록</div>
      <button class="modal-close" onclick="closeFormModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label>거래유형 *</label>
          <select class="form-select" id="f_georae">
            <option value="">선택</option>
            <option>매매</option><option>전세</option><option>월세</option>
          </select>
        </div>
        <div class="form-group">
          <label>매물종류 *</label>
          <select class="form-select" id="f_type">
            <option value="">선택</option>
            <option>토지</option><option>공장창고</option><option>상가</option>
            <option>아파트</option><option>빌라</option><option>원투룸</option>
          </select>
        </div>
        <div class="form-group full">
          <label>주소 *</label>
          <input class="form-input" type="text" id="f_address" placeholder="예) 경기도 화성시 팔탄면 ...">
        </div>
        <div class="form-group">
          <label>가격</label>
          <input class="form-input" type="text" id="f_price" placeholder="예) 3억5000만 / 보3억/월100">
        </div>
        <div class="form-group">
          <label>토지면적 (평)</label>
          <input class="form-input" type="text" id="f_landArea" placeholder="예) 100">
        </div>
        <div class="form-group">
          <label>연면적 (평)</label>
          <input class="form-input" type="text" id="f_totalArea" placeholder="예) 50">
        </div>
        <div class="form-group">
          <label>도로부지면적 (평)</label>
          <input class="form-input" type="text" id="f_roadArea" placeholder="예) 15">
        </div>
        <div class="form-group">
          <label>용도지역</label>
          <input class="form-input" type="text" id="f_useZone" placeholder="예) 계획관리지역">
        </div>
        <div class="form-group">
          <label>지목</label>
          <input class="form-input" type="text" id="f_jimok" placeholder="예) 대, 전, 답, 공장">
        </div>
        <div class="form-group">
          <label>건축물용도</label>
          <input class="form-input" type="text" id="f_buildingUse" placeholder="예) 단독주택, 근린생활시설">
        </div>
        <div class="form-group">
          <label>사용승인일</label>
          <input class="form-input" type="date" id="f_approvalDate">
        </div>
        <div class="form-group">
          <label>전기 (kw)</label>
          <input class="form-input" type="text" id="f_electric" placeholder="예) 50kw, 100kw">
        </div>
        <div class="form-group">
          <label>진출입로</label>
          <input class="form-input" type="text" id="f_access" placeholder="예) 40ft츄레라, 5톤트럭, 1톤트럭">
        </div>
        <div class="form-group">
          <label>소유자명</label>
          <input class="form-input" type="text" id="f_ownerName" placeholder="소유자 이름">
        </div>
        <div class="form-group">
          <label>소유자 연락처</label>
          <input class="form-input" type="text" id="f_ownerPhone" placeholder="010-0000-0000">
        </div>
        <div class="form-group full">
          <label>특이사항 / 메모</label>
          <textarea class="form-textarea" id="f_memo" placeholder="특이사항, 권리관계, 기타 메모 등..."></textarea>
        </div>
        <div class="form-group full">
          <label>사진 (여러 장 가능)</label>
          <div class="photo-upload-area" id="uploadArea"
            onclick="document.getElementById('f_photos').click()"
            ondragover="handleDragOver(event)"
            ondragleave="handleDragLeave(event)"
            ondrop="handleDrop(event)">
            <div class="upload-icon">📷</div>
            <div>클릭하거나 사진을 여기에 드래그하세요</div>
            <div style="font-size:11px;margin-top:4px;color:var(--text-muted)">JPG, PNG 등 이미지 파일</div>
          </div>
          <input type="file" id="f_photos" accept="image/*" multiple style="display:none" onchange="handlePhotoSelect(event)">
          <div class="photo-preview-grid" id="photoPreviewGrid"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeFormModal()">취소</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveProperty()">저장</button>
    </div>
  </div>
</div>

<!-- 상세 모달 -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="detailTitle"></div>
      <button class="modal-close" onclick="closeDetailModal()">×</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeDetailModal()">닫기</button>
      <button class="btn btn-primary" id="detailEditBtn">수정</button>
    </div>
  </div>
</div>

<!-- 라이트박스 -->
<div class="lightbox" id="lightbox" onclick="if(event.target===this)closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightboxImg" src="" alt="">
  <div class="lightbox-nav">
    <button onclick="lightboxPrev()">‹</button>
    <a id="lightboxDownload" download="사진.jpg" style="background:rgba(255,255,255,0.15);color:#fff;border-radius:8px;padding:8px 18px;font-size:14px;text-decoration:none;">⬇ 다운로드</a>
    <button onclick="lightboxNext()">›</button>
  </div>
  <div class="lightbox-counter" id="lightboxCounter"></div>
</div>

<!-- 전체 지도 모달 -->
<div id="mapAllModal" onclick="if(event.target===this)closeMapAll()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">📍 전체 매물 지도</div>
      <button class="modal-close" onclick="closeMapAll()">×</button>
    </div>
    <div class="modal-body" style="padding:16px">
      <div id="mapAll"></div>
      <div id="mapAllInfo" style="margin-top:12px;font-size:12px;color:var(--text-muted);text-align:center"></div>
    </div>
  </div>
</div>

<script>
// ── 전역 변수 ──────────────────────────────
var db, storage;
var properties = [];
var editingId = null;
var currentPhotos = [];
var lightboxPhotos = [];
var lightboxIndex = 0;
var COLLECTION = 'properties';

// ── Firebase 초기화 ───────────────────────

// ── Firebase CRUD ─────────────────────────
function load() {
  showLoading();
  db.collection(COLLECTION).orderBy('createdDate','desc').get()
    .then(function(snap) {
      properties = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
      renderTable();
    })
    .catch(function(e){
      console.error(e);
      properties = [];
      renderTable();
    });
}

function saveNew(data, callback) {
  var maxNo = properties.length > 0 ? Math.max.apply(null, properties.map(function(p){return p.propNo||0;})) : 0;
  if (!data.propNo) data.propNo = maxNo + 1;
  db.collection(COLLECTION).add(data)
    .then(function(ref){ callback(null, ref.id); })
    .catch(function(e){ callback(e); });
}

function saveEdit(id, data, callback) {
  db.collection(COLLECTION).doc(id).update(data)
    .then(function(){ callback(null); })
    .catch(function(e){ callback(e); });
}

function deleteFromDB(id, photos, callback) {
  var deletePhotos = function() {
    if (!photos || photos.length === 0) return db.collection(COLLECTION).doc(id).delete();
    var deletes = photos.filter(function(u){return u && u.startsWith('https://');}).map(function(url){
      try { return storage.refFromURL(url).delete(); } catch(e){ return Promise.resolve(); }
    });
    return Promise.all(deletes).then(function(){ return db.collection(COLLECTION).doc(id).delete(); });
  };
  deletePhotos().then(function(){ callback(null); }).catch(function(e){ callback(e); });
}

function uploadPhotos(id, photoList, callback) {
  var urls = [];
  var i = 0;
  function next() {
    if (i >= photoList.length) { callback(null, urls); return; }
    var src = photoList[i];
    if (src.startsWith('https://')) { urls.push(src); i++; next(); return; }
    var ref = storage.ref('properties/' + id + '/photo_' + Date.now() + '_' + i + '.jpg');
    ref.putString(src, 'data_url')
      .then(function(){ return ref.getDownloadURL(); })
      .then(function(url){ urls.push(url); i++; next(); })
      .catch(function(e){ callback(e); });
  }
  next();
}

// ── 테이블 ────────────────────────────────
function renderTable() {
  var q = document.getElementById('searchInput').value.toLowerCase();
  var fg = document.getElementById('filterGeorae').value;
  var ft = document.getElementById('filterType').value;
  var list = properties.filter(function(p){
    if(fg && p.georae!==fg) return false;
    if(ft && p.type!==ft) return false;
    if(q){var hay=[p.address,p.memo,p.ownerName,p.ownerPhone,p.useZone,p.jimok].join(' ').toLowerCase(); if(!hay.includes(q)) return false;}
    return true;
  });
  // 정렬
  list.sort(function(a, b) {
    var va = a[sortKey] || '';
    var vb = b[sortKey] || '';
    // 숫자 필드
    if(sortKey === 'propNo' || sortKey === 'landArea' || sortKey === 'totalArea') {
      va = parseFloat(va) || 0;
      vb = parseFloat(vb) || 0;
      return sortDir === 'asc' ? va - vb : vb - va;
    }
    va = String(va).toLowerCase();
    vb = String(vb).toLowerCase();
    if(va < vb) return sortDir === 'asc' ? -1 : 1;
    if(va > vb) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });

  var tbody = document.getElementById('tableBody');
  var empty = document.getElementById('emptyState');
  if(list.length===0){ tbody.innerHTML=''; empty.style.display='block'; }
  else {
    empty.style.display='none';
    tbody.innerHTML = list.map(function(p){
      var thumb = p.photos&&p.photos.length>0
        ? '<img class="table-thumb" src="'+p.photos[0]+'" alt="사진">'
        : '<span class="muted">—</span>';
      return '<tr>'+
        '<td style="font-weight:700;color:var(--accent)">'+(p.propNo||'-')+'</td>'+
        '<td>'+thumb+'</td>'+
        '<td><span class="tag tag-'+(p.georae||'')+'">'+(p.georae||'-')+'</span></td>'+
        '<td><span class="tag tag-'+(p.type||'')+'">'+(p.type||'-')+'</span></td>'+
        '<td class="address-text">'+(p.address||'-')+'</td>'+
        '<td style="font-weight:600">'+(p.price||'-')+'</td>'+
        '<td class="muted">'+(p.landArea?p.landArea+'평':'-')+'</td>'+
        '<td class="muted">'+(p.totalArea?p.totalArea+'평':'-')+'</td>'+
        '<td class="muted">'+(p.useZone||'-')+'</td>'+
        '<td class="muted">'+(p.jimok||'-')+'</td>'+
        '<td class="muted">'+(p.ownerName||'-')+'</td>'+
        '<td class="muted" style="font-size:11px">'+(p.createdDate||'-')+'</td>'+
        '<td><div class="action-btns">'+
          '<button class="btn btn-outline btn-sm" onclick="openDetail(\''+p.id+'\')">상세</button>'+
          '<button class="btn btn-danger btn-sm" onclick="deleteProperty(\''+p.id+'\')">삭제</button>'+
        '</div></td>'+
      '</tr>';
    }).join('');
  }
  renderStats();
}

var sortKey = 'createdDate';
var sortDir = 'desc';

function sortTable(key) {
  if(sortKey === key) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortKey = key;
    sortDir = 'asc';
  }
  // 모든 정렬 아이콘 초기화
  ['propNo','georae','type','address','price','landArea','totalArea','useZone','jimok','ownerName','createdDate'].forEach(function(k){
    var el = document.getElementById('sort_'+k);
    if(el) el.textContent = '';
  });
  // 현재 정렬 아이콘 표시
  var el = document.getElementById('sort_'+key);
  if(el) el.textContent = sortDir === 'asc' ? ' ▲' : ' ▼';
  renderTable();
}

// ── 사진 처리 ─────────────────────────────
function handlePhotoSelect(e){
  Array.from(e.target.files).forEach(readPhoto);
  e.target.value='';
}
function handleDragOver(e){ e.preventDefault(); document.getElementById('uploadArea').classList.add('drag-over'); }
function handleDragLeave(e){ document.getElementById('uploadArea').classList.remove('drag-over'); }
function handleDrop(e){
  e.preventDefault(); document.getElementById('uploadArea').classList.remove('drag-over');
  Array.from(e.dataTransfer.files).filter(function(f){return f.type.startsWith('image/');}).forEach(readPhoto);
}
function readPhoto(file){
  var reader = new FileReader();
  reader.onload = function(e){
    var img = new Image();
    img.onload = function(){
      var MAX=1200, w=img.width, h=img.height;
      if(w>MAX||h>MAX){ if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
      var canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      currentPhotos.push(canvas.toDataURL('image/jpeg',0.7));
      renderPhotoPreview();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function renderPhotoPreview(){
  document.getElementById('photoPreviewGrid').innerHTML = currentPhotos.map(function(src,i){
    return '<div class="photo-thumb-wrap"><img src="'+src+'" alt="사진'+(i+1)+'"><button class="photo-thumb-del" onclick="removePhoto('+i+')">×</button></div>';
  }).join('');
}
function removePhoto(i){ currentPhotos.splice(i,1); renderPhotoPreview(); }

function openLightbox(photos,idx){ lightboxPhotos=photos; lightboxIndex=idx; updateLightbox(); document.getElementById('lightbox').classList.add('active'); }
function updateLightbox(){
  var src=lightboxPhotos[lightboxIndex];
  document.getElementById('lightboxImg').src=src;
  document.getElementById('lightboxCounter').textContent=(lightboxIndex+1)+' / '+lightboxPhotos.length;
  var dl=document.getElementById('lightboxDownload'); dl.href=src; dl.download='사진_'+(lightboxIndex+1)+'.jpg';
}
function lightboxPrev(){ lightboxIndex=(lightboxIndex-1+lightboxPhotos.length)%lightboxPhotos.length; updateLightbox(); }
function lightboxNext(){ lightboxIndex=(lightboxIndex+1)%lightboxPhotos.length; updateLightbox(); }
function closeLightbox(){ document.getElementById('lightbox').classList.remove('active'); }
document.addEventListener('keydown',function(e){
  if(!document.getElementById('lightbox').classList.contains('active')) return;
  if(e.key==='ArrowLeft') lightboxPrev();
  if(e.key==='ArrowRight') lightboxNext();
  if(e.key==='Escape') closeLightbox();
});

function saveProperty(){
  var georae=document.getElementById('f_georae').value;
  var type=document.getElementById('f_type').value;
  var address=document.getElementById('f_address').value.trim();
  if(!georae||!type||!address){ alert('거래유형, 매물종류, 주소는 필수입니다.'); return; }
  var btn=document.getElementById('saveBtn'); btn.textContent='저장 중...'; btn.disabled=true;
  var now=new Date();
  var dateStr=now.toLocaleDateString('ko-KR');
  var timeStr=now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  var data={
    georae:georae, type:type, address:address,
    price:document.getElementById('f_price').value.trim(),
    landArea:document.getElementById('f_landArea').value.trim(),
    totalArea:document.getElementById('f_totalArea').value.trim(),
    roadArea:document.getElementById('f_roadArea').value.trim(),
    useZone:document.getElementById('f_useZone').value.trim(),
    jimok:document.getElementById('f_jimok').value.trim(),
    buildingUse:document.getElementById('f_buildingUse').value.trim(),
    approvalDate:document.getElementById('f_approvalDate').value,
    electric:document.getElementById('f_electric').value.trim(),
    access:document.getElementById('f_access').value.trim(),
    ownerName:document.getElementById('f_ownerName').value.trim(),
    ownerPhone:document.getElementById('f_ownerPhone').value.trim(),
    memo:document.getElementById('f_memo').value.trim(),
    updatedDate:dateStr, updatedTime:timeStr,
  };
  var docId=editingId||genId();
  uploadPhotos(docId, currentPhotos, function(err, urls){
    if(err){ alert('사진 업로드 오류: '+err.message); btn.textContent='저장'; btn.disabled=false; return; }
    data.photos=urls;
    if(editingId){
      saveEdit(editingId, data, function(err){
        btn.textContent='저장'; btn.disabled=false;
        if(err){ alert('저장 오류: '+err.message); return; }
        var idx=properties.findIndex(function(p){return p.id===editingId;});
        properties[idx]=Object.assign({},properties[idx],data);
        renderTable(); closeFormModal();
      });
    } else {
      data.createdDate=dateStr; data.createdTime=timeStr; data.updatedDate=''; data.updatedTime='';
      saveNew(data, function(err, newId){
        btn.textContent='저장'; btn.disabled=false;
        if(err){ alert('저장 오류: '+err.message); return; }
        properties.unshift(Object.assign({id:newId},data));
        renderTable(); closeFormModal();
      });
    }
  });
}

function deleteProperty(id){
  if(!confirm('이 매물을 삭제하시겠습니까?')) return;
  var p=properties.find(function(x){return x.id===id;});
  deleteFromDB(id, p?p.photos:[], function(err){
    if(err){ alert('삭제 오류: '+err.message); return; }
    properties=properties.filter(function(x){return x.id!==id;});
    renderTable();
  });
}

function downloadExcel(){
  if(properties.length===0){ alert('다운로드할 매물이 없습니다.'); return; }
  var headers=['No.','거래유형','매물종류','주소','가격','토지면적(평)','연면적(평)','도로부지면적(평)','용도지역','지목','건축물용도','사용승인일','전기(kw)','진출입로','소유자명','소유자연락처','특이사항/메모','등록일','등록시간','최종수정일','최종수정시간'];
  var rows=properties.map(function(p){
    return [p.propNo||'',p.georae||'',p.type||'',p.address||'',p.price||'',p.landArea||'',p.totalArea||'',p.roadArea||'',p.useZone||'',p.jimok||'',p.buildingUse||'',p.approvalDate||'',p.electric||'',p.access||'',p.ownerName||'',p.ownerPhone||'',p.memo||'',p.createdDate||'',p.createdTime||'',p.updatedDate||'',p.updatedTime||''];
  });
  var BOM='\uFEFF';
  var csv=BOM+[headers].concat(rows).map(function(row){
    return row.map(function(c){ return '"'+String(c).replace(/"/g,'""')+'"'; }).join(',');
  }).join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download='새롬부동산_매물목록.csv'; a.click();
  URL.revokeObjectURL(url);
}

// ── 엑셀 업로드 ───────────────────────────
function uploadExcel(e){
  var file=e.target.files[0]; if(!file) return; e.target.value='';
  var reader=new FileReader();
  reader.onload=function(ev){
    var text=ev.target.result.replace(/^\uFEFF/,'');
    var lines=text.split('\n').filter(function(l){return l.trim();});
    if(lines.length<2){ alert('데이터가 없습니다.'); return; }
    var headers=parseCSV(lines[0]);
    var ci={
      georae:headers.indexOf('거래유형'), type:headers.indexOf('매물종류'),
      address:headers.indexOf('주소'), price:headers.indexOf('가격'),
      landArea:headers.indexOf('토지면적(평)'), totalArea:headers.indexOf('연면적(평)'),
      roadArea:headers.indexOf('도로부지면적(평)'), useZone:headers.indexOf('용도지역'),
      jimok:headers.indexOf('지목'), buildingUse:headers.indexOf('건축물용도'),
      approvalDate:headers.indexOf('사용승인일'), electric:headers.indexOf('전기(kw)'),
      access:headers.indexOf('진출입로'), ownerName:headers.indexOf('소유자명'),
      ownerPhone:headers.indexOf('소유자연락처'), memo:headers.indexOf('특이사항/메모'),
    };
    if(ci.address===-1){ alert('올바른 양식이 아닙니다.\n엑셀 다운로드 후 양식에 맞게 입력해주세요.'); return; }
    var dataRows=lines.slice(1);
    if(!confirm(dataRows.length+'건의 매물을 등록하시겠습니까?')) return;
    var now=new Date();
    var dateStr=now.toLocaleDateString('ko-KR');
    var timeStr=now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    var maxNo=properties.length>0?Math.max.apply(null,properties.map(function(p){return p.propNo||0;})):0;
    var success=0, fail=0, idx=0;
    function next(){
      if(idx>=dataRows.length){ renderTable(); alert('업로드 완료!\n성공: '+success+'건 / 실패: '+fail+'건'); return; }
      var cols=parseCSV(dataRows[idx]); idx++;
      var addr=ci.address>=0?(cols[ci.address]||''):'';
      if(!addr.trim()){ fail++; next(); return; }
      function g(k){ return ci[k]>=0?(cols[ci[k]]||''):''; }
      var data={
        georae:g('georae'), type:g('type'), address:addr, price:g('price'),
        landArea:g('landArea'), totalArea:g('totalArea'), roadArea:g('roadArea'),
        useZone:g('useZone'), jimok:g('jimok'), buildingUse:g('buildingUse'),
        approvalDate:g('approvalDate'), electric:g('electric'), access:g('access'),
        ownerName:g('ownerName'), ownerPhone:g('ownerPhone'), memo:g('memo'),
        photos:[], propNo:maxNo+success+1,
        createdDate:dateStr, createdTime:timeStr, updatedDate:'', updatedTime:'',
      };
      saveNew(data, function(err, newId){
        if(err){ fail++; } else { properties.unshift(Object.assign({id:newId},data)); success++; }
        next();
      });
    }
    next();
  };
  reader.readAsText(file, 'UTF-8');
}

function parseCSV(row){
  var result=[], cur='', inQ=false;
  for(var i=0;i<row.length;i++){
    var c=row[i];
    if(c==='"'){ if(inQ&&row[i+1]==='"'){cur+='"';i++;}else inQ=!inQ; }
    else if(c===','&&!inQ){ result.push(cur.trim()); cur=''; }
    else cur+=c;
  }
  result.push(cur.trim()); return result;
}

// ── PC버전 보기 ───────────────────────────
function togglePCView() {
  var meta = document.querySelector('meta[name="viewport"]');
  var btn = document.querySelector('[onclick="togglePCView()"]');
  if(meta.content.includes('width=device-width')) {
    meta.content = 'width=1280';
    btn.textContent = '📱 모바일버전';
  } else {
    meta.content = 'width=device-width, initial-scale=1.0';
    btn.textContent = '🖥 PC버전';
  }
}

// ── 전체 지도 ─────────────────────────────
function openMapAll() {
  if(typeof kakao === 'undefined') { alert('카카오 지도가 아직 로드되지 않았습니다. 잠시 후 다시 시도해주세요.'); return; }
  if(properties.length === 0) { alert('등록된 매물이 없습니다.'); return; }
  document.getElementById('mapAllModal').classList.add('active');

  setTimeout(function(){
    var container = document.getElementById('mapAll');
    var map = new kakao.maps.Map(container, { center: new kakao.maps.LatLng(36.5, 127.5), level: 13 });
    var gc = new kakao.maps.services.Geocoder();
    var bounds = new kakao.maps.LatLngBounds();
    var successCount = 0;

    // 지도 클릭시 오버레이 닫기
    kakao.maps.event.addListener(map, 'click', function() {
      if(window._mapOverlay) { window._mapOverlay.setMap(null); window._mapOverlay = null; }
    });

    properties.forEach(function(p) {
      if(!p.address) return;
      gc.addressSearch(p.address, function(result, status) {
        if(status !== kakao.maps.services.Status.OK) return;
        var coords = new kakao.maps.LatLng(result[0].y, result[0].x);
        var marker = new kakao.maps.Marker({ map: map, position: coords });
        bounds.extend(coords);
        successCount++;
        if(successCount > 0) map.setBounds(bounds);

        // 마커 클릭 시 커스텀 오버레이
        (function(marker, p) {
          kakao.maps.event.addListener(marker, 'click', function() {
            if(window._mapOverlay) window._mapOverlay.setMap(null);

            var content = document.createElement('div');
            content.className = 'map-marker-info';
            content.style.cursor = 'pointer';
            content.innerHTML =
              '<div class="mi-title">No.'+(p.propNo||'-')+' '+p.georae+' / '+p.type+'</div>'+
              '<div class="mi-addr">📍 '+(p.address||'-')+'</div>'+
              (p.price?'<div class="mi-price">💰 '+p.price+'</div>':'')+
              (p.landArea?'<div style="font-size:12px;color:var(--text-muted)">토지 '+p.landArea+'평</div>':'')+
              '<div style="margin-top:8px;text-align:center;font-size:12px;color:var(--accent);font-weight:600;">▶ 클릭하면 상세보기</div>';

            content.onclick = function() {
              openDetail(p.id);
            };

            var overlay = new kakao.maps.CustomOverlay({
              content: content,
              map: map,
              position: marker.getPosition(),
              yAnchor: 1.4,
              zIndex: 3
            });
            window._mapOverlay = overlay;
          });
        })(marker, p);

        document.getElementById('mapAllInfo').textContent = '총 '+successCount+'개 매물 표시 중';
      });
    });
  }, 300);
}

function closeMapAll() {
  document.getElementById('mapAllModal').classList.remove('active');
}

// ── 주소 컬럼 리사이즈 ───────────────────
(function(){
  var th, resizer, startX, startW;
  resizer = document.getElementById('addressResizer');
  th = document.getElementById('thAddress');
  resizer.addEventListener('mousedown', function(e) {
    startX = e.pageX;
    startW = th.offsetWidth;
    resizer.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    function onMove(e) {
      var w = Math.max(80, startW + (e.pageX - startX));
      th.style.width = w + 'px';
      th.style.minWidth = w + 'px';
    }
    function onUp() {
      resizer.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    e.preventDefault();
  });
  // 터치 지원
  resizer.addEventListener('touchstart', function(e) {
    startX = e.touches[0].pageX;
    startW = th.offsetWidth;
    function onMove(e) {
      var w = Math.max(80, startW + (e.touches[0].pageX - startX));
      th.style.width = w + 'px';
      th.style.minWidth = w + 'px';
    }
    function onEnd() {
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onEnd);
    }
    document.addEventListener('touchmove', onMove);
    document.addEventListener('touchend', onEnd);
    e.preventDefault();
  });
})();
