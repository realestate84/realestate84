<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>새롬부동산 매물관리시스템</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3a7ef6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="새롬부동산">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Nanum+Gothic&display=swap" rel="stylesheet">
<!-- Firebase compat -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<!-- 카카오맵 -->
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=f08b63af7ea30749c5105b52cb8828f7&libraries=services,roadview"></script>
<style>
:root {
  --bg:#f4f6fb; --surface:#fff; --surface2:#eef1f8; --border:#dde2f0;
  --accent:#3a7ef6; --accent2:#6c47f5; --text:#1a1f36; --text-muted:#7a85a8;
  --danger:#e04a5a;
}
body.dark {
  --bg:#1e2028; --surface:#272b35; --surface2:#303540; --border:#3d4258;
  --accent:#6b9ff8; --accent2:#9b7ef8;
  --text:#bec4d8; --text-muted:#6a7090; --danger:#e06070;
}
body.dark .mobile-drawer { background:var(--surface) !important; }
body.dark .login-card { background:var(--surface) !important; color:var(--text) !important; }
body.dark .btn-outline { background:transparent; color:var(--text-muted); border-color:var(--border); }
body.dark .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); }
body.dark .tag { opacity:0.85; }
body.dark .form-input, body.dark .form-textarea, body.dark .form-select { background:var(--bg); color:var(--text); border-color:var(--border); }
body.dark .search-input, body.dark .filter-select { background:var(--bg); color:var(--text); }
body.dark thead { background:var(--surface2); }
body.dark .detail-section { border-color:var(--border); }
body.dark .doc-row { background:var(--bg); }
body.dark .ad-light:not(.on):not(.dim1):not(.dim2):not(.warn) { background:#3a3f55; }
body.dark .dep-light:not(.on) { background:#3a3f55; }
body.dark .table-wrap { background:var(--surface); border-color:var(--border); }
body.dark td { border-bottom-color:var(--border); }
body.dark tr:hover td { background:rgba(107,159,248,0.05); }
body.dark tr:hover td:first-child { background:var(--surface); filter:brightness(1.05); }
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;height:100vh;overflow:hidden;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,0.06);}
.logo{font-family:'Nanum Gothic',sans-serif;font-size:20px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.btn-primary:hover{opacity:0.85;}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-muted);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger{background:rgba(224,74,90,0.12);color:var(--danger);border:1px solid rgba(224,74,90,0.3);}
.btn-danger:hover{background:rgba(224,74,90,0.22);}
.btn-sm{padding:5px 11px;font-size:12px;}
.container{max-width:1400px;margin:0 auto;padding:24px;display:flex;flex-direction:column;height:calc(100vh - 60px);}
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:16px;flex-shrink:0;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 16px;display:flex;align-items:center;gap:10px;}
.stat-num{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.stat-label{font-size:12px;color:var(--text-muted);}
.filter-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:20px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;flex-shrink:0;}
.search-input,.filter-select{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s;}
.search-input{flex:1;min-width:200px;}
.search-input:focus,.filter-select:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--text-muted);}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:auto;flex:1;min-height:0;}
table{width:100%;min-width:1200px;border-collapse:collapse;font-size:12px;}
th:first-child, td:first-child{position:sticky;left:0;z-index:5;background:var(--surface);}
thead th:first-child{z-index:15;background:var(--surface2);}
tr:hover td{background:rgba(58,126,246,0.05);}
tr:hover td:first-child{background:var(--surface);filter:brightness(0.97);}thead tr{position:sticky;top:0;z-index:10;background:var(--surface);}
thead{background:var(--surface2);}
th{padding:8px 6px;text-align:left;color:var(--text-muted);font-weight:500;font-size:11px;white-space:nowrap;border-bottom:1px solid var(--border);}
th[onclick]:hover{color:var(--accent);background:rgba(58,126,246,0.05);}
td{padding:7px 6px;border-bottom:1px solid rgba(221,226,240,0.6);vertical-align:middle;white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(58,126,246,0.03);}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;}
.tag-매매{background:rgba(58,126,246,0.15);color:#3a7ef6;}
.tag-전세{background:rgba(108,71,245,0.15);color:#6c47f5;}
.tag-월세{background:rgba(240,160,48,0.15);color:#f0a030;}
.tag-토지{background:rgba(46,171,122,0.15);color:#2eab7a;}
.tag-공장창고{background:rgba(224,104,48,0.15);color:#e06830;}
.tag-상가\/사무실{background:rgba(224,74,90,0.15);color:#e04a5a;}
.tag-오피스텔{background:rgba(255,152,0,0.15);color:#ff9800;}
.tag-절대농지{background:rgba(76,175,80,0.15);color:#4caf50;}
.tag-단독주택{background:rgba(121,85,72,0.15);color:#795548;}
.tag-펜션{background:rgba(233,30,99,0.15);color:#e91e63;}
.tag-건물{background:rgba(96,125,139,0.15);color:#607d8b;}
.tag-아파트{background:rgba(58,126,246,0.15);color:#3a7ef6;}
.tag-빌라{background:rgba(108,71,245,0.15);color:#6c47f5;}
.tag-원투룸{background:rgba(32,170,200,0.15);color:#20aac8;}
.ad-light{display:inline-block;width:10px;height:10px;border-radius:50%;background:#ccc;flex-shrink:0;}
.dep-light{display:inline-block;width:10px;height:10px;border-radius:50%;background:#ccc;flex-shrink:0;}
.dep-light.on{background:#3a7ef6;box-shadow:0 0 6px rgba(58,126,246,0.7);}
.table-thumb{width:36px;height:36px;border-radius:6px;object-fit:cover;border:1px solid var(--border);}
.ad-light.on{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,0.7);}
.ad-light.dim1{background:#facc15;box-shadow:0 0 4px rgba(250,204,21,0.6);}
.ad-light.dim2{background:#fde68a;box-shadow:none;}
.ad-light.warn{background:#ef4444;box-shadow:0 0 6px rgba(239,68,68,0.7);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
@keyframes spin{to{transform:rotate(360deg);}}
.action-btns{display:flex;gap:5px;}
.muted{color:var(--text-muted);}
.address-text{max-width:180px;overflow:hidden;text-overflow:ellipsis;}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
.empty-icon{font-size:48px;margin-bottom:12px;}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.active{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:700px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;animation:modalIn 0.22s ease;-webkit-overflow-scrolling:touch;}
@keyframes modalIn{from{opacity:0;transform:translateY(18px) scale(0.97)}to{opacity:1;transform:none}}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:16px;font-weight:700;}
.modal-close{background:none;border:none;color:var(--text-muted);font-size:22px;cursor:pointer;line-height:1;padding:4px;}
.modal-close:hover{color:var(--text);}
.modal-body{padding:20px 24px;overflow-y:auto;flex:1;min-height:0;-webkit-overflow-scrolling:touch;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group.full{grid-column:1/-1;}
label{font-size:12px;color:var(--text-muted);font-weight:500;}
.form-input,.form-select,.form-textarea{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s;width:100%;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);}
.form-input::placeholder,.form-textarea::placeholder{color:var(--text-muted);}
.form-textarea{resize:vertical;min-height:240px;}
/* Detail */
.detail-section{margin-bottom:20px;}
.detail-section-title{font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.detail-item label{display:block;font-size:11px;color:var(--text-muted);margin-bottom:3px;}
.detail-item .val{font-size:14px;font-weight:500;}
.detail-item.full{grid-column:1/-1;}
/* Photo */
.photo-upload-area{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all 0.2s;color:var(--text-muted);font-size:13px;}
.photo-upload-area:hover,.photo-upload-area.drag-over{border-color:var(--accent);background:rgba(58,126,246,0.04);color:var(--accent);}
.photo-upload-area .upload-icon{font-size:28px;margin-bottom:6px;}
.photo-preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-top:10px;}
.photo-thumb-wrap{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;border:1px solid var(--border);background:var(--bg);}
.photo-thumb-wrap img{width:100%;height:100%;object-fit:cover;}
.photo-thumb-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.detail-photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-top:4px;}
/* Lightbox */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:9999;align-items:center;justify-content:center;flex-direction:column;}
.lightbox.active{display:flex;}
.lightbox img{max-width:90vw;max-height:80vh;border-radius:8px;object-fit:contain;}
.lightbox-close{position:absolute;top:18px;right:22px;background:none;border:none;color:#fff;font-size:32px;cursor:pointer;}
.lightbox-nav{display:flex;gap:12px;margin-top:16px;align-items:center;}
.lightbox-nav button{background:rgba(255,255,255,0.15);border:none;color:#fff;border-radius:8px;padding:8px 20px;cursor:pointer;font-size:18px;}
.lightbox-nav button:hover{background:rgba(255,255,255,0.25);}
.lightbox-counter{color:rgba(255,255,255,0.5);font-size:13px;margin-top:10px;}
#kakaoMap{width:100%;height:250px;border-radius:10px;border:1px solid var(--border);margin-top:4px;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
@media(max-width:768px){
  .container{padding:12px;}
  .form-grid{grid-template-columns:1fr;}
  .detail-grid{grid-template-columns:1fr;}
  .header-actions{display:none;}
  .mobile-menu-btn{display:flex !important;}
  .mobile-drawer.open{display:block !important;}
}
.mobile-menu-btn{display:none;background:none;border:none;cursor:pointer;font-size:22px;padding:4px 8px;color:var(--text);}
.mobile-drawer{display:none;position:fixed;top:60px;right:0;width:220px;background:#fff;border-left:1px solid var(--border);border-bottom:1px solid var(--border);border-radius:0 0 0 12px;box-shadow:-4px 4px 20px rgba(0,0,0,0.1);z-index:150;padding:10px;}
.mobile-drawer.open{display:block;}
.mobile-drawer button{width:100%;text-align:left;margin-bottom:4px;border-radius:8px;padding:10px 14px;font-size:13px;}
.mobile-overlay{display:none;position:fixed;inset:0;z-index:140;}
.mobile-overlay.open{display:block;}
/* 컬럼 리사이즈 */
th{position:relative;}
.col-resizer{position:absolute;right:0;top:0;height:100%;width:6px;cursor:col-resize;user-select:none;z-index:1;}
.col-resizer:hover,.col-resizer.dragging{background:var(--accent);opacity:0.5;}
/* 전체지도 */
#mapAllModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:300;align-items:center;justify-content:center;padding:12px;}
#mapAllModal.active{display:flex;}
#mapAllModal .modal{max-width:1200px;width:100%;height:95vh;display:flex;flex-direction:column;}
#mapAll{width:100%;flex:1;border-radius:10px;border:1px solid var(--border);}
.map-marker-info{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 14px;min-width:180px;font-family:'Noto Sans KR',sans-serif;font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,0.12);}
.map-marker-info .mi-title{font-weight:700;color:var(--accent);margin-bottom:4px;}
.map-marker-info .mi-addr{color:var(--text);margin-bottom:2px;}
.map-marker-info .mi-price{color:var(--danger);font-weight:600;}
/* 상세모달은 전체지도 위에 표시 */
#detailModal{z-index:500;}
/* 지도 체크박스 필터 */
.map-chk-label{display:inline-flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;color:var(--text);user-select:none;}
.map-chk-label input{width:14px;height:14px;cursor:pointer;}
.map-chk-dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0;}
/* 문서 섹션 */
.doc-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;}
.doc-row-title{font-size:13px;font-weight:500;color:var(--text);}
.doc-row-actions{display:flex;gap:6px;align-items:center;}
.doc-status{font-size:11px;color:var(--text-muted);}
.doc-status.uploaded{color:var(--success);}
@media print {
  body * { visibility: hidden !important; }
  #printArea, #printArea * { visibility: visible !important; }
  #printArea { position: fixed; inset: 0; background: #fff; padding: 30px; z-index: 9999; }
  #printArea .detail-section-title { color: #000 !important; }
  #printArea .val { color: #000 !important; }
  #printArea .detail-grid { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 12px !important; }
  #printArea .detail-item.full { grid-column: 1 / -1 !important; }
  #printArea .no-print { display: none !important; }
  #printArea .detail-section { break-inside: avoid; }
  #kakaoMap { break-inside: avoid; break-before: auto; }
  @page { margin: 10mm; size: A4; }
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

<!-- 로그인 화면 -->
<div id="loginScreen" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);">
  <div class="login-card" style="background:#fff;border-radius:16px;padding:40px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,0.1);">
    <div style="text-align:center;margin-bottom:28px;">
      <div style="font-family:'Nanum Gothic',sans-serif;font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;">새롬부동산</div>
      <div style="font-size:13px;color:var(--text-muted);">매물관리시스템</div>
    </div>
    <div style="margin-bottom:14px;">
      <label style="font-size:12px;color:var(--text-muted);font-weight:500;">이메일</label>
      <input id="loginEmail" type="email" class="form-input" placeholder="이메일 주소" style="margin-top:4px;width:100%" onkeydown="if(event.key==='Enter')document.getElementById('loginPw').focus()">
    </div>
    <div style="margin-bottom:20px;">
      <label style="font-size:12px;color:var(--text-muted);font-weight:500;">비밀번호</label>
      <input id="loginPw" type="password" class="form-input" placeholder="비밀번호" style="margin-top:4px;width:100%" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary" onclick="doLogin()" style="width:100%;justify-content:center;padding:12px;">로그인</button>
    <div style="display:flex;align-items:center;gap:8px;margin:16px 0;">
      <div style="flex:1;height:1px;background:var(--border)"></div>
      <span style="font-size:12px;color:var(--text-muted)">또는</span>
      <div style="flex:1;height:1px;background:var(--border)"></div>
    </div>
    <button onclick="doGoogleLogin()" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:8px;">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:18px;height:18px;">
      Google 계정으로 로그인
    </button>
    <div id="loginErr" style="margin-top:12px;font-size:12px;color:var(--danger);text-align:center;"></div>
    <div style="margin-top:16px;text-align:center;">
      <span style="font-size:12px;color:var(--text-muted);cursor:pointer;text-decoration:underline;" onclick="doResetPw()">비밀번호 찾기</span>
    </div>
  </div>
</div>

<!-- 메인 화면 -->
<div id="mainScreen" style="display:none">

<header>
  <div class="logo" onclick="refreshApp()" style="cursor:pointer">새롬부동산 매물관리시스템</div>
  <div class="header-actions">
    <button class="btn btn-outline" onclick="toggleDarkMode()" id="darkModeBtn">🌙 다크</button>
    <button class="btn btn-outline" onclick="openSettings()">⚙️ 설정</button>
    <button class="btn btn-outline" onclick="togglePCView()">🖥 PC버전</button>
    <button class="btn btn-outline" onclick="openStats()">📊 통계보기</button>
    <button class="btn btn-outline" onclick="openMapAll()">🗺 전체 지도</button>
    <button class="btn btn-outline" onclick="document.getElementById('excelUpload').click()">📤 엑셀 업로드</button>
    <input type="file" id="excelUpload" accept=".csv" style="display:none" onchange="uploadExcel(event)">
    <button class="btn btn-outline" onclick="downloadExcel()">📥 엑셀 다운로드</button>
    <button class="btn btn-primary" onclick="openAddModal()">＋ 매물 등록</button>

  </div>

// ── Firebase CRUD ─────────────────────────
function load() {
  showLoading();
  // 실시간 리스너 - 다른 기기에서 변경시 자동 반영
  db.collection(COLLECTION).orderBy('createdDate','desc').onSnapshot(function(snap) {
    properties = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
    renderTable();
  }, function(e){
    console.error(e);
    properties = [];
    renderTable();
  });
}

function saveNew(data, callback) {
  var maxNo = properties.length > 0 ? Math.max.apply(null, properties.map(function(p){return p.propNo||0;})) : 0;
  if (!data.propNo) data.propNo = maxNo + 1;
  db.collection(COLLECTION).add(data)
    .then(function(ref){ callback(null, ref.id); })
    .catch(function(e){ callback(e); });
}

function saveEdit(id, data, callback) {
  db.collection(COLLECTION).doc(id).update(data)
    .then(function(){ callback(null); })
    .catch(function(e){ callback(e); });
}

function deleteFromDB(id, photos, callback) {
  var deletePhotos = function() {
    if (!photos || photos.length === 0) return db.collection(COLLECTION).doc(id).delete();
    var deletes = photos.filter(function(u){return u && u.startsWith('https://');}).map(function(url){
      try { return storage.refFromURL(url).delete(); } catch(e){ return Promise.resolve(); }
    });
    return Promise.all(deletes).then(function(){ return db.collection(COLLECTION).doc(id).delete(); });
  };
  deletePhotos().then(function(){ callback(null); }).catch(function(e){ callback(e); });
}

function uploadPhotos(id, photoList, callback) {
  var urls = [];
  var i = 0;
  function next() {
    if (i >= photoList.length) { callback(null, urls); return; }
    var src = photoList[i];
    if (src.startsWith('https://')) { urls.push(src); i++; next(); return; }
    var ref = storage.ref('properties/' + id + '/photo_' + Date.now() + '_' + i + '.jpg');
    ref.putString(src, 'data_url')
      .then(function(){ return ref.getDownloadURL(); })
      .then(function(url){ urls.push(url); i++; next(); })
      .catch(function(e){ callback(e); });
  }
  next();
}

// ── 통계 ──────────────────────────────────
function renderStats() {} // 통계바 제거됨

function openStats() {
  var total = properties.length;
  if(total === 0) { alert('등록된 매물이 없습니다.'); return; }

  // 거래유형별
  var georaeMap = {};
  // 매물종류별
  var typeMap = {};
  // 지역별 (시/군 단위)
  var regionMap = {};
  // 용도지역별
  var useZoneMap = {};
  // 월별 등록
  var monthMap = {};

  properties.forEach(function(p) {
    // 거래유형
    var g = p.georae || '미분류';
    georaeMap[g] = (georaeMap[g]||0) + 1;
    // 매물종류
    var t = p.type || '미분류';
    typeMap[t] = (typeMap[t]||0) + 1;
    // 지역 (주소 첫 두 단어: 예) 인천시 강화군)
    if(p.address) {
      var parts = p.address.trim().split(/\s+/);
      var region = parts.slice(0,2).join(' ');
      regionMap[region] = (regionMap[region]||0) + 1;
    }
    // 용도지역
    if(p.useZone) {
      var uz = p.useZone.trim();
      useZoneMap[uz] = (useZoneMap[uz]||0) + 1;
    }
    // 월별 등록
    if(p.createdDate) {
      var m = p.createdDate.replace(/\./g,'-').split('-').slice(0,2).join('-').trim();
      monthMap[m] = (monthMap[m]||0) + 1;
    }
  });

  function makeBar(map, colorFn) {
    var entries = Object.entries(map).sort(function(a,b){return b[1]-a[1];});
    var max = entries[0] ? entries[0][1] : 1;
    return entries.map(function(e, i) {
      var pct = Math.round(e[1]/total*100);
      var barW = Math.round(e[1]/max*100);
      return '<div style="margin-bottom:10px;">'+
        '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;">'+
          '<span style="font-weight:500;">'+e[0]+'</span>'+
          '<span style="color:var(--text-muted)">'+e[1]+'건 ('+pct+'%)</span>'+
        '</div>'+
        '<div style="background:var(--bg);border-radius:6px;height:10px;overflow:hidden;">'+
          '<div style="height:100%;width:'+barW+'%;background:'+colorFn(i)+';border-radius:6px;transition:width 0.4s;"></div>'+
        '</div>'+
      '</div>';
    }).join('');
  }

  var colors1 = ['#3a7ef6','#6c47f5','#f0a030'];
  var colors2 = ['#2eab7a','#e06830','#e04a5a','#20aac8','#9b59b6','#e91e8c','#ff9800','#4caf50','#795548','#e91e63'];
  var colors3 = ['#3a7ef6','#6c47f5','#2eab7a','#f0a030','#e04a5a','#20aac8','#9b59b6','#ff9800'];

  // 출발가능 매물 수
  var depCount = properties.filter(function(p){ return p.departure !== false; }).length;
  var avgPrice = (function(){
    var priced = properties.filter(function(p){ return p.price && /^[\d,]+$/.test(p.price.replace(/,/g,'')); });
    if(!priced.length) return '-';
    var sum = priced.reduce(function(s,p){ return s+(parseInt(p.price.replace(/[^0-9]/g,''))||0); },0);
    return Math.round(sum/priced.length).toLocaleString()+'만원';
  })();

  var html =
    // 요약 카드
    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:24px;">'+
      '<div style="background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;padding:14px;color:#fff;text-align:center;">'+
        '<div style="font-size:26px;font-weight:700;">'+total+'</div><div style="font-size:12px;opacity:0.85;">전체 매물</div></div>'+
      '<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;">'+
        '<div style="font-size:22px;font-weight:700;color:var(--accent);">'+(georaeMap['매매']||0)+'</div><div style="font-size:12px;color:var(--text-muted);">매매</div></div>'+
      '<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;">'+
        '<div style="font-size:22px;font-weight:700;color:var(--accent2);">'+(georaeMap['전세']||0)+'</div><div style="font-size:12px;color:var(--text-muted);">전세</div></div>'+
      '<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;">'+
        '<div style="font-size:22px;font-weight:700;color:#f0a030;">'+(georaeMap['월세']||0)+'</div><div style="font-size:12px;color:var(--text-muted);">월세</div></div>'+
      '<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;">'+
        '<div style="font-size:22px;font-weight:700;color:#3a7ef6;">'+depCount+'</div><div style="font-size:12px;color:var(--text-muted);">출발가능</div></div>'+
    '</div>'+
    // 3단 그리드
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">'+
      '<div style="background:var(--bg);border-radius:12px;padding:16px;">'+
        '<div style="font-size:13px;font-weight:600;margin-bottom:14px;color:var(--text);">거래유형별 매물수</div>'+
        makeBar(georaeMap, function(i){ return colors1[i%colors1.length]; })+
      '</div>'+
      '<div style="background:var(--bg);border-radius:12px;padding:16px;">'+
        '<div style="font-size:13px;font-weight:600;margin-bottom:14px;color:var(--text);">매물종류별 매물수</div>'+
        makeBar(typeMap, function(i){ return colors2[i%colors2.length]; })+
      '</div>'+
      '<div style="background:var(--bg);border-radius:12px;padding:16px;">'+
        '<div style="font-size:13px;font-weight:600;margin-bottom:14px;color:var(--text);">지역별 매물수</div>'+
        makeBar(regionMap, function(i){ return colors3[i%colors3.length]; })+
      '</div>'+
      '<div style="background:var(--bg);border-radius:12px;padding:16px;">'+
        '<div style="font-size:13px;font-weight:600;margin-bottom:14px;color:var(--text);">용도지역별 매물수</div>'+
        (Object.keys(useZoneMap).length ? makeBar(useZoneMap, function(i){ return colors2[i%colors2.length]; }) :
        '<div style="font-size:12px;color:var(--text-muted);">용도지역 데이터 없음</div>')+
      '</div>'+
      '<div style="background:var(--bg);border-radius:12px;padding:16px;grid-column:1/-1;">'+
        '<div style="font-size:13px;font-weight:600;margin-bottom:14px;color:var(--text);">월별 등록 매물수</div>'+
        (Object.keys(monthMap).length ? makeBar(
          Object.fromEntries(Object.entries(monthMap).sort()),
          function(i){ return colors3[i%colors3.length]; }) :
        '<div style="font-size:12px;color:var(--text-muted);">등록일 데이터 없음</div>')+
      '</div>'+
    '</div>';

  document.getElementById('statsBody').innerHTML = html;
  document.getElementById('statsModal').classList.add('active');
}

function closeStats() {
  document.getElementById('statsModal').classList.remove('active');
}

document.addEventListener('click', function(e) {
  if(e.target === document.getElementById('statsModal')) closeStats();
});

function renderTable() {
  var q = document.getElementById('searchInput').value.toLowerCase();

  var ft = document.getElementById('filterType').value;
  // 상세검색
  var priceMin = parseFloat(document.getElementById('adv_priceMin').value) || null;
  var priceMax = parseFloat(document.getElementById('adv_priceMax').value) || null;
  var landMin  = parseFloat(document.getElementById('adv_landMin').value)  || null;
  var landMax  = parseFloat(document.getElementById('adv_landMax').value)  || null;
  var areaMin  = parseFloat(document.getElementById('adv_areaMin').value)  || null;
  var areaMax  = parseFloat(document.getElementById('adv_areaMax').value)  || null;
  var useZone  = document.getElementById('adv_useZone').value.trim().toLowerCase();
  var jimok    = document.getElementById('adv_jimok').value.trim().toLowerCase();
  var region   = document.getElementById('adv_region').value.trim().toLowerCase();

  var list = properties.filter(function(p){
    if(fg && p.georae!==fg) return false;
    if(ft && p.type!==ft) return false;
    if(q){var hay=[p.address,p.georae,p.type,p.price,p.maintenance,p.premium,p.landArea,p.totalArea,p.supplyArea,p.exclusiveArea,p.tempArea,p.roadArea,p.useZone,p.jimok,p.buildingUse,p.approvalDate,p.floors,p.electric,p.hoist,p.direction,p.height,p.parking,p.toilet,p.elevator,p.factoryReg,p.access,p.regOwnerName,p.ownerName,p.ownerPhone,p.memo,p.note,p.naver,p.propNo].join(' ').toLowerCase(); if(!hay.includes(q)) return false;}
    // 가격 범위
    var price = parseInt((p.price||'').replace(/[^0-9]/g,'')) || 0;
    if(priceMin && price < priceMin) return false;
    if(priceMax && price > priceMax) return false;
    // 토지면적
    var land = parseFloat(p.landArea) || 0;
    if(landMin && land < landMin) return false;
    if(landMax && land > landMax) return false;
    // 연면적
    var area = parseFloat(p.totalArea) || 0;
    if(areaMin && area < areaMin) return false;
    if(areaMax && area > areaMax) return false;
    // 용도지역
    if(useZone && !(p.useZone||'').toLowerCase().includes(useZone)) return false;
    // 지목
    if(jimok && !(p.jimok||'').toLowerCase().includes(jimok)) return false;
    // 지역
    if(region && !(p.address||'').toLowerCase().includes(region)) return false;
    // 출발가능만 보기
    if(window._depFilterOn && p.departure === false) return false;
    return true;
  });
  // 정렬
  if(sortKey) {
    list.sort(function(a, b) {
      // 광고 상태 정렬
      if(sortKey === 'adStatus') {
        var la = getAdDaysLeft(a.adStart, a.adEnd) || 0;
        var lb = getAdDaysLeft(b.adStart, b.adEnd) || 0;
        if(la < 0) la = 0;
        if(lb < 0) lb = 0;
        return sortDir === 'asc' ? la - lb : lb - la;
      }
      if(sortKey === 'departure') {
        var da = a.departure !== false ? 1 : 0;
        var db = b.departure !== false ? 1 : 0;
        return sortDir === 'asc' ? da - db : db - da;
      }
      var va = a[sortKey] || '';
      var vb = b[sortKey] || '';
      // 숫자 필드
      if(sortKey === 'propNo' || sortKey === 'landArea' || sortKey === 'totalArea') {
        va = parseFloat(va) || 0;
        vb = parseFloat(vb) || 0;
        return sortDir === 'asc' ? va - vb : vb - va;
      }
      va = String(va).toLowerCase();
      vb = String(vb).toLowerCase();
      if(va < vb) return sortDir === 'asc' ? -1 : 1;
      if(va > vb) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
  }

  var tbody = document.getElementById('tableBody');
  var empty = document.getElementById('emptyState');
  if(list.length===0){ tbody.innerHTML=''; empty.style.display='block'; }
  else {
    empty.style.display='none';
    tbody.innerHTML = list.map(function(p){
      var thumb = p.photos&&p.photos.length>0
        ? '<img class="table-thumb" src="'+p.photos[0]+'" alt="사진">'
        : '<span class="muted">—</span>';
      return '<tr>'+
        '<td style="font-weight:700;color:var(--accent)">'+(p.propNo||'-')+'</td>'+
        '<td>'+thumb+'</td>'+
        '<td><span class="tag tag-'+(p.georae||'')+'">'+(p.georae||'-')+'</span></td>'+
        '<td><span class="tag tag-'+(p.type||'')+'">'+(p.type||'-')+'</span></td>'+
        '<td class="address-text" onclick="copyAddress(\''+( p.address||'').replace(/'/g,"\\'")+'\',event)" style="cursor:pointer;" title="클릭하면 주소가 복사됩니다">'+(p.address||'-')+'</td>'+
        '<td style="font-weight:600">'+(p.price||'-')+'</td>'+
        '<td class="muted">'+(p.landArea?p.landArea+'평':'-')+'</td>'+
        '<td class="muted">'+(p.totalArea?p.totalArea+'평':'-')+'</td>'+
        '<td class="muted">'+(p.useZone||'-')+'</td>'+
        '<td class="muted">'+(p.jimok||'-')+'</td>'+
        '<td class="muted">'+(p.ownerName||'-')+'</td>'+
        '<td class="muted" style="font-size:11px">'+(p.createdDate||'-')+'</td>'+
        '<td style="text-align:center"><span class="ad-light '+getAdLightClass(p.adStart, p.adEnd)+'"></span></td>'+
        '<td style="text-align:center"><span class="dep-light '+(p.departure===false?'':'on')+'"></span></td>'+
        '<td><div class="action-btns">'+
          '<button class="btn btn-outline btn-sm" onclick="openDetail(\''+p.id+'\')">상세</button>'+
        '</div></td>'+
      '</tr>';
    }).join('');
  }
  renderStats();
}

var sortKey = 'propNo';
var sortDir = 'desc';

function sortTable(key) {
  if(sortKey === key) {
    if(sortDir === 'asc') {
      sortDir = 'desc';
    } else if(sortDir === 'desc') {
      sortKey = null;
      sortDir = null;
    } else {
      sortDir = 'asc';
    }
  } else {
    sortKey = key;
    sortDir = 'asc';
  }
  // 모든 정렬 아이콘 초기화
  ['propNo','georae','type','address','price','landArea','totalArea','useZone','jimok','ownerName','createdDate','adStatus','departure'].forEach(function(k){
    var el = document.getElementById('sort_'+k);
    if(el) el.textContent = '';
  });
  // 현재 정렬 아이콘 표시
  if(sortKey) {
    var el = document.getElementById('sort_'+sortKey);
    if(el) el.textContent = sortDir === 'asc' ? ' ▲' : ' ▼';
  }
  renderTable();
}

function formatPhone(input) {
  var v = input.value.replace(/[^0-9]/g, '');
  if(v.length <= 3) input.value = v;
  else if(v.length <= 7) input.value = v.slice(0,3) + '-' + v.slice(3);
  else input.value = v.slice(0,3) + '-' + v.slice(3,7) + '-' + v.slice(7,11);
}

function uploadDetailPhotos(e, propId) {
  var files = Array.from(e.target.files);
  if(!files.length) return;
  var label = e.target.parentElement;
  label.textContent = '업로드 중...';

  var p = properties.find(function(x){ return x.id === propId; });
  var existingPhotos = (p && p.photos) ? p.photos.slice() : [];
  var addrBase = (p && p.address ? p.address.replace(/[\\/:*?"<>|]/g,'').trim() : propId);
  var existingCount = existingPhotos.length;

  var uploads = files.map(function(file, i) {
    var ext = file.name.split('.').pop() || 'jpg';
    var fileName = addrBase + '_사진' + (existingCount + i + 1) + '.' + ext;
    var ref = storage.ref('properties/' + propId + '/photos/' + fileName);
    return ref.put(file).then(function(){ return ref.getDownloadURL(); });
  });

  Promise.all(uploads).then(function(urls) {
    var newPhotos = existingPhotos.concat(urls);
    return db.collection(COLLECTION).doc(propId).update({ photos: newPhotos }).then(function() {
      if(p) p.photos = newPhotos;
      openDetail(propId);
    });
  }).catch(function(err) {
    alert('사진 업로드 오류: ' + err.message);
    openDetail(propId);
  });
}

  e.preventDefault(); document.getElementById('uploadArea').classList.remove('drag-over');

}
function readPhoto(file){
  var reader = new FileReader();
  reader.onload = function(e){
    var img = new Image();
    img.onload = function(){
      var MAX=1200, w=img.width, h=img.height;
      if(w>MAX||h>MAX){ if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
      var canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      currentPhotos.push(canvas.toDataURL('image/jpeg',0.7));
      renderPhotoPreview();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function renderPhotoPreview(){
  document.getElementById('photoPreviewGrid').innerHTML = currentPhotos.map(function(src,i){
    return '<div class="photo-thumb-wrap"><img src="'+src+'" alt="사진'+(i+1)+'"><button class="photo-thumb-del" onclick="removePhoto('+i+')">×</button></div>';

    if(parent && parent.style && parent.style.display === 'grid') {
      // 그리드 안 항목은 개별 숨김만
    }

  var priceGrid = document.querySelector('#formModal [data-field-key="price"]');

  var ptype = p.type || '';

  // 필드 표시 헬퍼
  function showField(key) { return isFieldVisible(ptype, key); }
  function fieldVal(key, val, suffix) {
    if(!showField(key)) return '';
    var v = val ? val+(suffix||'') : '-';
    return '<div class="detail-item"><label>'+key+'</label><div class="val">'+v+'</div></div>';
  }

  // fieldSections 기준으로 기본정보/상세정보 분리
  var allOrdered = getOrderedFields(ptype);

  function renderFieldVal(f) {
    var raw = p[f.key] || '';

      });

    };
    setTimeout(function(){ tryMap(0); }, 500);

function switchMapView(mode) {
  var mapEl = document.getElementById('kakaoMap');
  var rvEl = document.getElementById('kakaoRoadview');
  var btnMap = document.getElementById('btnMapView');
  var btnSky = document.getElementById('btnSkyView');
  var btnRv = document.getElementById('btnRvView');
  if(!mapEl || !rvEl) return;

  // 버튼 스타일 초기화
  [btnMap, btnSky, btnRv].forEach(function(b){ if(b){ b.style.background='#fff'; b.style.color='#333'; b.style.fontWeight='normal'; }});

  if(mode === 'map') {
    mapEl.style.display = '';
    rvEl.style.display = 'none';
    if(window._kakaoMapObj) window._kakaoMapObj.setMapTypeId(kakao.maps.MapTypeId.ROADMAP);
    if(btnMap){ btnMap.style.background='var(--accent)'; btnMap.style.color='#fff'; btnMap.style.fontWeight='bold'; }
  } else if(mode === 'sky') {
    mapEl.style.display = '';
    rvEl.style.display = 'none';
    if(window._kakaoMapObj) window._kakaoMapObj.setMapTypeId(kakao.maps.MapTypeId.HYBRID);
    if(btnSky){ btnSky.style.background='var(--accent)'; btnSky.style.color='#fff'; btnSky.style.fontWeight='bold'; }
  } else if(mode === 'roadview') {
    mapEl.style.display = 'none';
    rvEl.style.display = '';
    if(btnRv){ btnRv.style.background='var(--accent)'; btnRv.style.color='#fff'; btnRv.style.fontWeight='bold'; }
    // 로드뷰 초기화 (최초 1회만)
    if(!window._rvInitialized && window._mapCoords) {
      var rvClient = new kakao.maps.RoadviewClient();
      var roadview = new kakao.maps.Roadview(rvEl);
      rvClient.getNearestPanoId(window._mapCoords, 50, function(panoId) {
        if(panoId) {
          roadview.setPanoId(panoId, window._mapCoords);
        } else {
          rvEl.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:13px">이 위치의 로드뷰를 찾을 수 없습니다</div>';
        }
      });
      window._rvInitialized = true;
    }
  }
}

// ── 삭제 ──────────────────────────────────
function downloadAllPhotos(id) {
  var p = properties.find(function(x){ return x.id===id; });
  if(!p || !p.photos || p.photos.length===0) return;
  var addrBase = (p.address ? p.address.replace(/[\\/:*?"<>|]/g,'').trim() : id);
  showToast('📦 ZIP 만드는 중...');
  var zip = new JSZip();
  var folder = zip.folder(addrBase);
  var fetches = p.photos.map(function(url, i) {
    return fetch(url)
      .then(function(res){ return res.blob(); })
      .then(function(blob){
        var ext = blob.type.includes('png') ? 'png' : blob.type.includes('gif') ? 'gif' : 'jpg';
        folder.file(addrBase + '_사진' + (i+1) + '.' + ext, blob);
      });
  });
  Promise.all(fetches).then(function() {
    return zip.generateAsync({ type:'blob' });
  }).then(function(content) {
    var a = document.createElement('a');
    a.href = URL.createObjectURL(content);
    a.download = addrBase + '_사진.zip';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    showToast('✅ ZIP 다운로드 완료!');
  }).catch(function(err) {
    alert('다운로드 오류: ' + err.message);
  });
}

function deleteOnePhoto(id, index) {

  var p = properties.find(function(x){ return x.id===id; });
  if(!p || !p.photos) return;
  var url = p.photos[index];

function refreshFormDocSection(propId) {
  var p = properties.find(function(x){ return x.id === propId; });
  if(!p) return;
  var docHtml = ['건축물대장','토지대장','토지등기부등본','건물등기부등본','토지이용계획','배치도'].map(function(docName){
    var url = p.docs && p.docs[docName] ? p.docs[docName] : null;
    return '<div class="doc-row">'+
      '<div>'+
        '<div class="doc-row-title">📄 '+docName+'</div>'+
        '<div class="doc-status'+(url?' uploaded':'')+'">'+( url?'✅ 업로드됨':'미등록')+'</div>'+
      '</div>'+
      '<div class="doc-row-actions">'+
        (url?'<button class="btn btn-outline btn-sm" onclick="openDoc(\''+url+'\',\''+docName+'\')">👁 보기</button>':'') +
        (url?'<button class="btn btn-danger btn-sm" onclick="deleteDoc(\''+propId+'\',\''+docName+'\')">🗑</button>':'') +
        '<label class="btn btn-outline btn-sm" style="cursor:pointer;margin:0">📤 업로드<input type="file" accept="'+(docName==='배치도'?'image/*,application/pdf':'application/pdf')+'" style="display:none" onchange="uploadDoc(event,\''+propId+'\',\''+docName+'\')"></label>'+
      '</div>'+
    '</div>';
  }).join('');
  var sec = document.getElementById('formDocSection');
  if(sec) sec.innerHTML = docHtml;
}

// ── 문서 업로드 ───────────────────────────
function uploadDoc(e, propId, docName) {
  var file = e.target.files[0];
  if(!file) return;
  if(docName !== '배치도' && file.type !== 'application/pdf') { alert('PDF 파일만 업로드 가능합니다.'); return; }
  if(docName === '배치도' && !file.type.match(/^(application\/pdf|image\/.+)$/)) { alert('PDF 또는 이미지 파일만 업로드 가능합니다.'); return; }
  var label = e.target.parentElement;
  var origText = label.childNodes[0].textContent;
  label.childNodes[0].textContent = '업로드 중...';

  var p = properties.find(function(x){ return x.id === propId; });
  var addrBase = (p && p.address ? p.address.replace(/[\\/:*?"<>|]/g,'').trim() : propId);
  var ext = file.name.split('.').pop() || 'pdf';
  var fileName = addrBase + '_' + docName + '.' + ext;

  var ref = storage.ref('properties/' + propId + '/docs/' + fileName);
  ref.put(file).then(function() {
    return ref.getDownloadURL();
  }).then(function(url) {
    var update = {};
    update['docs.' + docName] = url;
    return db.collection(COLLECTION).doc(propId).update(update).then(function() {
      var p = properties.find(function(x){ return x.id === propId; });
      if(p) { if(!p.docs) p.docs={}; p.docs[docName] = url; }
      if(editingId === propId) refreshFormDocSection(propId); // 폼 내용 유지, 문서섹션만 갱신
      else openDetail(propId);
    });
  }).catch(function(err) {
    alert('업로드 오류: ' + err.message);
    label.childNodes[0].textContent = origText;
  });
}

// ── 문서 삭제 ────────────────────────────
function deleteDoc(propId, docName) {
  if(!confirm('「'+docName+'」을 삭제하시겠습니까?')) return;
  var p = properties.find(function(x){ return x.id === propId; });
  var url = p && p.docs ? p.docs[docName] : null;

  var doDelete = function() {
    var update = {};
    update['docs.' + docName] = firebase.firestore.FieldValue.delete();
    db.collection(COLLECTION).doc(propId).update(update).then(function() {
      if(p && p.docs) delete p.docs[docName];
      if(editingId === propId) refreshFormDocSection(propId); // 폼 내용 유지, 문서섹션만 갱신
      else openDetail(propId);
    }).catch(function(err){ alert('삭제 오류: ' + err.message); });
  };

  // Storage 파일도 삭제
  if(url) {
    try {
      storage.refFromURL(url).delete().then(doDelete).catch(doDelete);
    } catch(e) { doDelete(); }
  } else { doDelete(); }
}

function getAdDaysLeft(adStart, adEnd) {
  if(!adStart) return null;
  if(adEnd) return 0; // 수동 종료
  var start = new Date(adStart);
  var now = new Date();
  var diff = Math.floor((now - start) / (1000*60*60*24));
  return 30 - diff;
}

function getAdLightClass(adStart, adEnd) {
  var left = getAdDaysLeft(adStart, adEnd);
  if(left === null || left <= 0) return '';
  if(left === 1) return 'warn';
  if(left === 2) return 'dim2';
  if(left <= 4) return 'dim1';
  return 'on';
}

function updateAdBtn(p) {
  var btn = document.getElementById('detailAdBtn');
  if(!btn) return;
  var left = getAdDaysLeft(p.adStart, p.adEnd);
  var isOn = left !== null && left > 0;

  if(isOn) {
    // 켜진 상태
    if(left === 1) {
      btn.textContent = '⚠️ 1일 전 (끄기)';
      btn.style.color = '#ef4444';
    } else {
      btn.textContent = '🟢 ' + left + '일 (끄기)';
      btn.style.color = '#22c55e';
    }
    btn.style.background = 'rgba(34,197,94,0.08)';
    btn.style.borderColor = 'transparent';
    btn.dataset.state = 'on';
  } else if(p.adEnd) {
    // 수동 종료
    btn.textContent = '⚫ 광고종료 (재시작)';
    btn.style.color = '#7a85a8';
    btn.style.background = 'transparent';
    btn.style.borderColor = 'transparent';
    btn.dataset.state = 'ended';
  } else if(p.adStart && left <= 0) {
    // 30일 만료 자동 종료
    btn.textContent = '⚫ 광고만료 (재시작)';
    btn.style.color = '#7a85a8';
    btn.style.background = 'transparent';
    btn.style.borderColor = 'transparent';
    btn.dataset.state = 'expired';
  } else {
    // 꺼진 상태 (시작 안함)
    btn.textContent = '⚫ 광고시작';
    btn.style.color = '#7a85a8';

function getVideoEmbed(url) {
  // 유튜브
  var ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if(ytMatch) {
    return '<iframe width="100%" height="280" src="https://www.youtube.com/embed/'+ytMatch[1]+'" frameborder="0" allowfullscreen style="border-radius:8px;"></iframe>';
  }
  // 유튜브 shorts
  var ytShorts = url.match(/youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/);
  if(ytShorts) {
    return '<iframe width="100%" height="280" src="https://www.youtube.com/embed/'+ytShorts[1]+'" frameborder="0" allowfullscreen style="border-radius:8px;"></iframe>';
  }
  // 네이버TV
  var naverMatch = url.match(/tv\.naver\.com\/v\/(\d+)/);
  if(naverMatch) {
    return '<iframe width="100%" height="280" src="https://tv.naver.com/embed/'+naverMatch[1]+'" frameborder="0" allowfullscreen style="border-radius:8px;"></iframe>';
  }
  // 기타 링크
  return '<a href="'+url+'" target="_blank" class="btn btn-outline" style="display:inline-flex;">🎬 동영상 보기</a>';
}

function downloadExcel(){
  if(properties.length===0){ alert('다운로드할 매물이 없습니다.'); return; }
  var headers=['No.','거래유형','매물종류','주소','가격','토지면적(평)','건축면적(평)','도로부지면적(평)','용도지역','지목','건축물용도','사용승인일','동력(kw)','호이스트(t)','진출입로','소유자명','소유자연락처','특이사항/메모','등록일','등록시간','최종수정일','최종수정시간'];
  var rows=properties.map(function(p){
    return [p.propNo||'',p.georae||'',p.type||'',p.address||'',p.price||'',p.landArea||'',p.totalArea||'',p.roadArea||'',p.useZone||'',p.jimok||'',p.buildingUse||'',p.approvalDate||'',p.electric||'',p.hoist||'',p.access||'',p.ownerName||'',p.ownerPhone||'',p.memo||'',p.createdDate||'',p.createdTime||'',p.updatedDate||'',p.updatedTime||''];
  });
  var BOM='\uFEFF';
  var csv=BOM+[headers].concat(rows).map(function(row){
    return row.map(function(c){ return '"'+String(c).replace(/"/g,'""')+'"'; }).join(',');
  }).join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download='새롬부동산_매물목록.csv'; a.click();
  URL.revokeObjectURL(url);
}

// ── 엑셀 업로드 ───────────────────────────
function uploadExcel(e){
  var file=e.target.files[0]; if(!file) return; e.target.value='';
  var reader=new FileReader();
  reader.onload=function(ev){
    var text=ev.target.result.replace(/^\uFEFF/,'');
    var lines=text.split('\n').filter(function(l){return l.trim();});
    if(lines.length<2){ alert('데이터가 없습니다.'); return; }
    var headers=parseCSV(lines[0]);
    var ci={
      georae:headers.indexOf('거래유형'), type:headers.indexOf('매물종류'),
      address:headers.indexOf('주소'), price:headers.indexOf('가격'),
      landArea:headers.indexOf('토지면적(평)'), totalArea:headers.indexOf('건축면적(평)'),
      roadArea:headers.indexOf('도로부지면적(평)'), useZone:headers.indexOf('용도지역'),
      jimok:headers.indexOf('지목'), buildingUse:headers.indexOf('건축물용도'),
      approvalDate:headers.indexOf('사용승인일'), electric:headers.indexOf('동력(kw)'),
      hoist:headers.indexOf('호이스트(t)'), access:headers.indexOf('진출입로'), ownerName:headers.indexOf('소유자명'),
      ownerPhone:headers.indexOf('소유자연락처'), memo:headers.indexOf('특이사항/메모'),
    };
    if(ci.address===-1){ alert('올바른 양식이 아닙니다.\n엑셀 다운로드 후 양식에 맞게 입력해주세요.'); return; }
    var dataRows=lines.slice(1);
    if(!confirm(dataRows.length+'건의 매물을 등록하시겠습니까?')) return;
    var now=new Date();
    var dateStr=now.toLocaleDateString('ko-KR');
    var timeStr=now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    var maxNo=properties.length>0?Math.max.apply(null,properties.map(function(p){return p.propNo||0;})):0;
    var success=0, fail=0, idx=0;
    function next(){
      if(idx>=dataRows.length){ renderTable(); alert('업로드 완료!\n성공: '+success+'건 / 실패: '+fail+'건'); return; }
      var cols=parseCSV(dataRows[idx]); idx++;
      var addr=ci.address>=0?(cols[ci.address]||''):'';
      if(!addr.trim()){ fail++; next(); return; }
      function g(k){ return ci[k]>=0?(cols[ci[k]]||''):''; }
      var data={
        georae:g('georae'), type:g('type'), address:addr, price:g('price'),
        landArea:g('landArea'), totalArea:g('totalArea'), roadArea:g('roadArea'),
        useZone:g('useZone'), jimok:g('jimok'), buildingUse:g('buildingUse'),
        approvalDate:g('approvalDate'), electric:g('electric'), hoist:g('hoist'), access:g('access'),
        ownerName:g('ownerName'), ownerPhone:g('ownerPhone'), memo:g('memo'),
        photos:[], propNo:maxNo+success+1,
        createdDate:dateStr, createdTime:timeStr, updatedDate:'', updatedTime:'',
      };
      saveNew(data, function(err, newId){
        if(err){ fail++; } else { properties.unshift(Object.assign({id:newId},data)); success++; }
        next();
      });
    }
    next();
  };
  reader.readAsText(file, 'UTF-8');
}

function parseCSV(row){
  var result=[], cur='', inQ=false;
  for(var i=0;i<row.length;i++){
    var c=row[i];
    if(c==='"'){ if(inQ&&row[i+1]==='"'){cur+='"';i++;}else inQ=!inQ; }
    else if(c===','&&!inQ){ result.push(cur.trim()); cur=''; }
    else cur+=c;
  }
  result.push(cur.trim()); return result;
}

function loadFieldSettings(callback) {
  db.collection('settings').doc(SETTINGS_DOC).get().then(function(doc) {
    if(doc.exists) {
      var data = doc.data();
      fieldSettings = data.fieldSettings || {};
      customFields = data.customFields || {};
      fieldOrder = data.fieldOrder || {};
      fieldSections = data.fieldSections || {};
      fieldLabelOverrides = data.fieldLabelOverrides || {};
      fieldSuffixOverrides = data.fieldSuffixOverrides || {};
    } else {
      fieldSettings = {};
      customFields = {};
      fieldOrder = {};
      fieldSections = {};
      PROP_TYPES.forEach(function(t) {
        fieldSettings[t] = {};
        DEFAULT_FIELDS.forEach(function(f) { fieldSettings[t][f.key] = true; });
        customFields[t] = [];
        fieldOrder[t] = DEFAULT_FIELDS.map(function(f){ return f.key; });
      });
      DEFAULT_FIELDS.forEach(function(f){ fieldSections[f.key] = f.section; });
      saveFieldSettings();
    }
    // 누락되거나 항목이 부족한 타입은 기존 타입 최신 설정으로 자동 동기화
    var refType = PROP_TYPES.find(function(t){ return fieldOrder[t] && fieldOrder[t].length > 0; });
    if(refType) {
      var refOrder    = fieldOrder[refType];
      var refCustoms  = customFields[refType] || [];
      var refSettings = fieldSettings[refType] || {};
      PROP_TYPES.forEach(function(t) {
        if(t === refType) return;
        // 항목 수가 기준 타입보다 적으면 → 최신 순서/커스텀항목 동기화
        var curOrder = fieldOrder[t] || [];
        if(curOrder.length < refOrder.length) {
          // 순서 동기화 (없는 키만 추가)
          fieldOrder[t] = refOrder.slice();
          // 커스텀 항목 동기화 (없는 항목만 추가, 기존 ON/OFF는 유지)
          if(!customFields[t]) customFields[t] = [];
          refCustoms.forEach(function(cf){
            var exists = customFields[t].find(function(f){ return f.key === cf.key; });
            if(!exists) customFields[t].push({key:cf.key, label:cf.label});
          });
          if(!fieldSettings[t]) fieldSettings[t] = {};
          // 새로 생긴 키는 OFF로 추가
          refOrder.forEach(function(key){
            if(fieldSettings[t][key] === undefined) fieldSettings[t][key] = false;
          });
        }
      });
    }
    // fieldSections 누락 키 채우기
    DEFAULT_FIELDS.forEach(function(f){
      if(!fieldSections[f.key]) fieldSections[f.key] = f.section;
    });
    if(callback) callback();
  });
}

function saveFieldSettings() {
  db.collection('settings').doc(SETTINGS_DOC).set({
    fieldSettings: fieldSettings,
    customFields: customFields,
    fieldOrder: fieldOrder,
    fieldSections: fieldSections,
    fieldLabelOverrides: fieldLabelOverrides,
    fieldSuffixOverrides: fieldSuffixOverrides
  });
}

// 항목의 실제 표시 이름 반환 (override 우선)
function getFieldLabel(key, defaultLabel) {
  return fieldLabelOverrides[key] || defaultLabel;
}

// 항목의 단위 반환 (override 우선, 없으면 DEFAULT suffix)
function getFieldSuffix(key) {
  if(fieldSuffixOverrides[key] !== undefined) return fieldSuffixOverrides[key];
  var def = DEFAULT_FIELDS.find(function(f){ return f.key===key; });
  return def ? (def.suffix||'') : '';
}

// 해당 타입의 전체 항목 순서대로 반환
function getOrderedFields(type) {
  var order = fieldOrder[type] || DEFAULT_FIELDS.map(function(f){ return f.key; });
  var customs = customFields[type] || [];
  // 커스텀 항목 key도 order에 없으면 끝에 추가
  customs.forEach(function(cf){
    if(order.indexOf(cf.key) === -1) order.push(cf.key);
  });
  // 전체 항목 맵
  var allFields = {};
  DEFAULT_FIELDS.forEach(function(f){ allFields[f.key] = {key:f.key, label:getFieldLabel(f.key,f.label), section:(fieldSections[f.key]||f.section), suffix:f.suffix}; });
  customs.forEach(function(cf){ allFields[cf.key] = {key:cf.key, label:getFieldLabel(cf.key,cf.label), section:(fieldSections[cf.key]||'상세정보'), suffix:'', custom:true}; });
  // order대로 반환 (존재하는 것만)
  return order.filter(function(k){ return allFields[k]; }).map(function(k){ return allFields[k]; });
}

function isFieldVisible(type, key) {
  if(!fieldSettings[type]) return true;
  if(fieldSettings[type][key] === undefined) return true;
  return fieldSettings[type][key];
}

// 설정 임시 상태 (저장 전까지 원본 유지)
var _tmpFieldSettings = null;
var _tmpCustomFields = null;
var _tmpFieldOrder = null;
var _tmpFieldSections = null;
var _tmpFieldLabelOverrides = null;
var _tmpFieldSuffixOverrides = null;

function openSettings() {
  _tmpFieldSettings = JSON.parse(JSON.stringify(fieldSettings));
  _tmpCustomFields  = JSON.parse(JSON.stringify(customFields));
  _tmpFieldOrder    = JSON.parse(JSON.stringify(fieldOrder));
  _tmpFieldSections = JSON.parse(JSON.stringify(fieldSections));
  _tmpFieldLabelOverrides = JSON.parse(JSON.stringify(fieldLabelOverrides));
  _tmpFieldSuffixOverrides = JSON.parse(JSON.stringify(fieldSuffixOverrides));
  window._settingsActiveType = '전체';
  renderSettingsPanel();
  document.getElementById('settingsModal').classList.add('active');
}

function closeSettings() {
  if(!confirm('변경사항을 취소하시겠습니까?\n수정한 내용이 저장되지 않아요.')) return;
  _tmpFieldSettings = null;
  _tmpCustomFields  = null;
  _tmpFieldOrder    = null;
  _tmpFieldSections = null;
  _tmpFieldLabelOverrides = null;
  _tmpFieldSuffixOverrides = null;
  document.getElementById('settingsModal').classList.remove('active');
}

function confirmSettings() {
  if(!confirm('설정을 저장하시겠습니까?\n모든 매물의 상세보기에 즉시 반영돼요.')) return;
  fieldSettings = JSON.parse(JSON.stringify(_tmpFieldSettings));
  customFields  = JSON.parse(JSON.stringify(_tmpCustomFields));
  fieldOrder    = JSON.parse(JSON.stringify(_tmpFieldOrder));
  fieldSections = JSON.parse(JSON.stringify(_tmpFieldSections));
  fieldLabelOverrides = JSON.parse(JSON.stringify(_tmpFieldLabelOverrides));
  fieldSuffixOverrides = JSON.parse(JSON.stringify(_tmpFieldSuffixOverrides));
  saveFieldSettings();
  _tmpFieldSettings = JSON.parse(JSON.stringify(fieldSettings));
  _tmpCustomFields  = JSON.parse(JSON.stringify(customFields));
  _tmpFieldOrder    = JSON.parse(JSON.stringify(fieldOrder));
  _tmpFieldSections = JSON.parse(JSON.stringify(fieldSections));
  _tmpFieldLabelOverrides = JSON.parse(JSON.stringify(fieldLabelOverrides));
  _tmpFieldSuffixOverrides = JSON.parse(JSON.stringify(fieldSuffixOverrides));
  showToast('✅ 설정이 저장됐어요!');
}

function renderSettingsPanel() {
  var activeType = window._settingsActiveType || '전체';
  var isAll = (activeType === '전체');
  // '전체' 탭은 첫번째 매물종류 기준으로 순서/항목 표시
  var refType = isAll ? PROP_TYPES[0] : activeType;

  var tmpSettings = _tmpFieldSettings;
  var tmpCustoms  = _tmpCustomFields;
  var tmpOrder    = _tmpFieldOrder;

  function tmpIsVisible(type, key) {
    if(!tmpSettings[type]) return true;
    if(tmpSettings[type][key] === undefined) return true;
    return tmpSettings[type][key];
  }

  function tmpGetOrderedFields(type) {
    var order = (tmpOrder[type] || DEFAULT_FIELDS.map(function(f){ return f.key; })).slice();
    var customs = tmpCustoms[type] || [];
    customs.forEach(function(cf){ if(order.indexOf(cf.key)===-1) order.push(cf.key); });
    var allFields = {};
    DEFAULT_FIELDS.forEach(function(f){ allFields[f.key]={key:f.key, label:(_tmpFieldLabelOverrides[f.key]||f.label), section:(tmpOrder[type]?(_tmpFieldSections[f.key]||f.section):f.section), suffix:f.suffix}; });
    customs.forEach(function(cf){ allFields[cf.key]={key:cf.key, label:(_tmpFieldLabelOverrides[cf.key]||cf.label), section:(_tmpFieldSections[cf.key]||'상세정보'), suffix:'', custom:true}; });
    return order.filter(function(k){ return allFields[k]; }).map(function(k){ return allFields[k]; });
  }

  var html = '';

  // 탭: 전체 + 각 매물종류
  html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;">';
  ['전체'].concat(PROP_TYPES).forEach(function(t) {
    var active = t === activeType;
    var isAllTab = (t === '전체');
    html += '<button onclick="switchSettingsTab(\''+t+'\')" style="padding:6px 14px;border-radius:20px;border:1px solid '+(isAllTab?'var(--accent2)':'var(--border)')+';cursor:pointer;font-size:12px;font-weight:'+(isAllTab?'700':'500')+';background:'+(active?(isAllTab?'var(--accent2)':'var(--accent)'):'var(--surface)')+';color:'+(active?'#fff':'var(--text)')+';transition:all 0.2s;">'+t+'</button>';
  });
  html += '</div>';

  // 안내 문구
  if(isAll) {
    html += '<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;padding:8px 10px;background:var(--surface2);border-radius:6px;">☰ 드래그로 순서 변경 (모든 매물종류 동시 적용) &nbsp;|&nbsp; 체크박스는 전체 표시/숨김</div>';
  } else {
    html += '<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;padding:8px 10px;background:var(--surface2);border-radius:6px;">체크박스로 <b>'+activeType+'</b> 매물의 표시/숨김만 설정할 수 있어요. 순서 변경·항목 추가는 <b>전체</b> 탭에서 하세요.</div>';
  }

  html += '<div id="fieldOrderList" style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:16px;">';

  var ordered = tmpGetOrderedFields(refType);
  var lastSection = null;

  ordered.forEach(function(f,i){
    var isCustom = !!f.custom;
    var checked = isAll
      ? PROP_TYPES.every(function(t){ return tmpIsVisible(t, f.key); })
      : tmpIsVisible(activeType, f.key);

    // 섹션 헤더: _tmpFieldSections 기준
    var sec = (_tmpFieldSections && _tmpFieldSections[f.key]) || '상세정보';
    if(sec !== lastSection) {
      if(lastSection !== null)
        html += '<div style="grid-column:1/-1;"></div>'; // 간격
      html += '<div style="grid-column:1/-1;font-size:11px;color:var(--text-muted);font-weight:700;margin-top:'+(lastSection?'10px':'4px')+';margin-bottom:4px;padding-bottom:6px;border-bottom:2px solid var(--border);">'+sec+'</div>';
      lastSection = sec;
    }

    var dragAttrs = isAll
      ? 'draggable="true" ondragstart="onFieldDragStart(event)" ondragover="onFieldDragOver(event)" ondrop="onFieldDrop(event)" ondragend="onFieldDragEnd(event)"'
      : '';
    var cursor = isAll ? 'cursor:grab;' : 'cursor:default;';

    html += '<div '+dragAttrs+' data-key="'+f.key+'" '+
      'style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);font-size:13px;'+cursor+'user-select:none;">'+
      (isAll ? '<span style="color:var(--text-muted);font-size:14px;flex-shrink:0;">☰</span>' : '<span style="width:18px;flex-shrink:0;"></span>')+
      '<input type="checkbox" '+(checked?'checked':'')+' onchange="tmpToggleField(\''+activeType+'\',\''+f.key+'\',this.checked)" onclick="event.stopPropagation()" style="cursor:pointer;width:15px;height:15px;flex-shrink:0;">'+
      '<span id="lbl_'+f.key+'" style="flex:1;">'+
        (_tmpFieldLabelOverrides[f.key]||f.label)+
        ((_tmpFieldSuffixOverrides[f.key]||f.suffix) ? '<span style="font-size:10px;color:var(--text-muted);margin-left:3px;">['+(_tmpFieldSuffixOverrides[f.key]!==undefined?_tmpFieldSuffixOverrides[f.key]:f.suffix)+']</span>' : '')+
        (isCustom?'<span style="font-size:10px;color:var(--accent);margin-left:4px;">커스텀</span>':'')+
      '</span>'+
      (isAll ? '<button onclick="startLabelEdit(\''+f.key+'\',\''+(_tmpFieldLabelOverrides[f.key]||f.label)+'\',\''+(_tmpFieldSuffixOverrides[f.key]!==undefined?_tmpFieldSuffixOverrides[f.key]:(f.suffix||''))+'\')" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:12px;padding:0 3px;opacity:0.6;" title="이름/단위 변경">✏️</button>' : '')+
      (isAll && isCustom ? '<button onclick="tmpDeleteCustomField(\''+f.key+'\')" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:13px;padding:0 2px;" title="삭제">✕</button>' : '')+
      '</div>';
  });

  html += '</div>';

  // 항목 추가: 전체 탭에서만 표시
  if(isAll) {
    html += '<div style="display:flex;gap:8px;align-items:center;padding-top:12px;border-top:1px solid var(--border);margin-bottom:16px;">'+
      '<input type="text" id="newFieldInput" class="form-input" placeholder="새 항목명 입력..." style="flex:1;font-size:13px;">'+
      '<button class="btn btn-outline btn-sm" onclick="tmpAddCustomField()" style="white-space:nowrap;">+ 항목 추가</button>'+
      '</div>';
  }

  // 저장/취소 버튼
  html += '<div style="display:flex;gap:10px;justify-content:flex-end;padding-top:12px;border-top:2px solid var(--border);">'+
    '<button class="btn btn-outline" onclick="closeSettings()" style="min-width:80px;">취소</button>'+
    '<button class="btn btn-primary" onclick="confirmSettings()" style="min-width:80px;">💾 저장</button>'+
    '</div>';

  document.getElementById('settingsBody').innerHTML = html;
}

// 임시 상태 변경 함수들
function tmpToggleField(type, key, val) {
  if(type === '전체') {
    // 전체 탭: 모든 매물종류에 동시 적용
    PROP_TYPES.forEach(function(t) {
      if(!_tmpFieldSettings[t]) _tmpFieldSettings[t] = {};
      _tmpFieldSettings[t][key] = val;
    });
  } else {
    if(!_tmpFieldSettings[type]) _tmpFieldSettings[type] = {};
    _tmpFieldSettings[type][key] = val;
  }
}

function tmpAddCustomField() {
  var input = document.getElementById('newFieldInput');
  var label = input.value.trim();
  if(!label) return;
  var key = 'custom_' + Date.now();
  PROP_TYPES.forEach(function(t) {
    if(!_tmpCustomFields[t]) _tmpCustomFields[t] = [];
    if(!_tmpFieldSettings[t]) _tmpFieldSettings[t] = {};
    if(!_tmpCustomFields[t].find(function(f){ return f.key===key; }))
      _tmpCustomFields[t].push({key:key, label:label});
    _tmpFieldSettings[t][key] = false; // 기본 OFF
    if(!_tmpFieldOrder[t]) _tmpFieldOrder[t] = DEFAULT_FIELDS.map(function(f){ return f.key; });
    if(_tmpFieldOrder[t].indexOf(key)===-1) _tmpFieldOrder[t].push(key);
  });
  input.value = '';
  renderSettingsPanel();
  showToast('항목 추가됐어요. 각 매물종류별로 체크 후 저장하세요!');
}

function tmpDeleteCustomField(key) {
  var affected = properties.filter(function(p){ return p[key] && String(p[key]).trim()!==''; });
  var msg = '이 항목을 모든 매물종류에서 삭제하시겠습니까?';
  if(affected.length>0) {
    var nums = affected.map(function(p){ return 'No.'+p.propNo; }).join(', ');
    msg = '⚠️ '+nums+' 매물에 입력된 내용이 있습니다.\n그래도 삭제하시겠습니까?';
  }
  if(!confirm(msg)) return;
  PROP_TYPES.forEach(function(t) {
    if(_tmpCustomFields[t]) _tmpCustomFields[t] = _tmpCustomFields[t].filter(function(f){ return f.key!==key; });
    if(_tmpFieldSettings[t]) delete _tmpFieldSettings[t][key];
    if(_tmpFieldOrder[t]) _tmpFieldOrder[t] = _tmpFieldOrder[t].filter(function(k){ return k!==key; });
  });
  renderSettingsPanel();
}

// 항목명 + 단위 인라인 편집

  var span = document.getElementById('lbl_'+key);
  if(!span) return;
  var parent = span.parentNode;
  parent.querySelectorAll('button').forEach(function(b){ b.style.display='none'; });
  parent.setAttribute('draggable','false');
  span.innerHTML =
    '<div onclick="event.stopPropagation()" ondragstart="event.stopPropagation()" style="display:flex;flex-direction:column;gap:4px;width:100%;">'+
      '<div style="display:flex;gap:4px;align-items:center;">'+
        '<span style="font-size:11px;color:var(--text-muted);white-space:nowrap;">항목명</span>'+
        '<input id="labelInput_'+key+'" type="text" value="'+currentLabel+'" '+
        'style="flex:1;font-size:12px;padding:2px 6px;border:1px solid var(--accent);border-radius:4px;background:var(--surface);color:var(--text);outline:none;" '+
        'onkeydown="if(event.key===\'Enter\')confirmLabelEdit(\''+key+'\');if(event.key===\'Escape\')renderSettingsPanel()">'+
      '</div>'+
      '<div style="display:flex;gap:4px;align-items:center;">'+
        '<span style="font-size:11px;color:var(--text-muted);white-space:nowrap;">단위</span>'+
        '<input id="suffixInput_'+key+'" type="text" value="'+currentSuffix+'" placeholder="예) 만원, 평, 개, kw" '+
        'style="flex:1;font-size:12px;padding:2px 6px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text);outline:none;" '+
        'onkeydown="if(event.key===\'Enter\')confirmLabelEdit(\''+key+'\');if(event.key===\'Escape\')renderSettingsPanel()">'+
      '</div>'+
      '<div style="display:flex;gap:4px;">'+
        '<button onclick="confirmLabelEdit(\''+key+'\')" style="flex:1;font-size:11px;padding:2px 4px;border-radius:4px;border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;">확인</button>'+
        '<button onclick="renderSettingsPanel()" style="flex:1;font-size:11px;padding:2px 4px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;">취소</button>'+
      '</div>'+
    '</div>';
  setTimeout(function(){ var el=document.getElementById('labelInput_'+key); if(el){el.focus();el.select();} },50);
}

function confirmLabelEdit(key) {
  var labelInput  = document.getElementById('labelInput_'+key);
  var suffixInput = document.getElementById('suffixInput_'+key);
  if(!labelInput) return;
  var newLabel  = labelInput.value.trim();
  var newSuffix = suffixInput ? suffixInput.value.trim() : '';
  if(!newLabel) { renderSettingsPanel(); return; }
  _tmpFieldLabelOverrides[key]  = newLabel;
  _tmpFieldSuffixOverrides[key] = newSuffix;
  // 커스텀 항목 label도 동기화
  PROP_TYPES.forEach(function(t){
    if(_tmpCustomFields[t]) {
      var cf = _tmpCustomFields[t].find(function(f){ return f.key===key; });
      if(cf) cf.label = newLabel;
    }
  });
  renderSettingsPanel();
}
var _dragSrcKey = null;
function onFieldDragStart(e) {
  _dragSrcKey = e.currentTarget.dataset.key;
  e.currentTarget.style.opacity = '0.4';
  e.dataTransfer.effectAllowed = 'move';
}
function onFieldDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.style.borderColor = 'var(--accent)';
}
function onFieldDragEnd(e) {
  e.currentTarget.style.opacity = '1';
  document.querySelectorAll('#fieldOrderList [data-key]').forEach(function(el){
    el.style.borderColor = 'var(--border)';
  });
}
function onFieldDrop(e) {
  e.preventDefault();
  var targetKey = e.currentTarget.dataset.key;
  if(!targetKey || targetKey === _dragSrcKey) return;

  // 섹션 이동: 드래그한 항목을 타겟의 섹션으로 변경
  var targetSection = _tmpFieldSections[targetKey] || '상세정보';
  _tmpFieldSections[_dragSrcKey] = targetSection;

  // 모든 타입 순서 업데이트
  PROP_TYPES.forEach(function(t) {
    var tOrder = (_tmpFieldOrder[t] || DEFAULT_FIELDS.map(function(f){ return f.key; })).slice();
    var fi = tOrder.indexOf(_dragSrcKey);
    var ti = tOrder.indexOf(targetKey);
    if(fi!==-1 && ti!==-1) {
      tOrder.splice(fi,1);
      tOrder.splice(ti,0,_dragSrcKey);
      _tmpFieldOrder[t] = tOrder;
    }
  });
  renderSettingsPanel();
}

function switchSettingsTab(type) {
  window._settingsActiveType = type;
  renderSettingsPanel();
}
// ── PC버전 보기 ───────────────────────────
function togglePCView() {
  var meta = document.querySelector('meta[name="viewport"]');
  var btn = document.querySelector('[onclick="togglePCView()"]');
  if(meta.content.includes('width=device-width')) {
    meta.content = 'width=1280';
    btn.textContent = '📱 모바일버전';
  } else {
    meta.content = 'width=device-width, initial-scale=1.0';
    btn.textContent = '🖥 PC버전';
  }
}

// ── 전체 지도 ─────────────────────────────
var _mapObj = null;
var _mapMarkers = [];
var _georaeColor = {'매매':'#3a7ef6','전세':'#6c47f5','월세':'#f0a030'};
var _typeColor   = {'토지':'#2eab7a','공장창고':'#e06830','상가/사무실':'#e04a5a','아파트':'#20aac8','빌라':'#9b59b6','원투룸':'#e91e8c','오피스텔':'#ff9800','절대농지':'#4caf50','단독주택':'#795548','펜션':'#e91e63','건물':'#607d8b'};

function getMarkerImage(p) {
  var color = _georaeColor[p.georae] || '#3a7ef6';
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">'+
    '<path d="M14 0C6.27 0 0 6.27 0 14c0 9.33 14 22 14 22S28 23.33 28 14C28 6.27 21.73 0 14 0z" fill="'+color+'"/>'+
    '<circle cx="14" cy="14" r="6" fill="white"/></svg>';
  var src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
  return new kakao.maps.MarkerImage(src, new kakao.maps.Size(28,36), {offset: new kakao.maps.Point(14,36)});
}

function openMapAll() {
  if(typeof kakao === 'undefined') { alert('카카오 지도가 아직 로드되지 않았습니다. 잠시 후 다시 시도해주세요.'); return; }
  if(properties.length === 0) { alert('등록된 매물이 없습니다.'); return; }
  document.querySelectorAll('.map-chk').forEach(function(c){ c.checked = true; });
  document.getElementById('mapAllModal').classList.add('active');

  setTimeout(function(){
    _mapObj = new kakao.maps.Map(document.getElementById('mapAll'), {center: new kakao.maps.LatLng(36.5,127.5), level:13});
    _mapMarkers = [];
    var gc = new kakao.maps.services.Geocoder();
    var bounds = new kakao.maps.LatLngBounds();

    window._mapClickTimer = null;
    kakao.maps.event.addListener(_mapObj, 'click', function() {
      window._mapClickTimer = setTimeout(function() {
        if(window._mapOverlay){window._mapOverlay.setMap(null);window._mapOverlay=null;}
      }, 200);
    });

    properties.forEach(function(p) {
      if(!p.address) return;
      gc.addressSearch(p.address, function(result, status) {
        if(status !== kakao.maps.services.Status.OK) return;
        var coords = new kakao.maps.LatLng(result[0].y, result[0].x);
        var marker = new kakao.maps.Marker({map:_mapObj, position:coords, image:getMarkerImage(p)});
        _mapMarkers.push({marker:marker, p:p});
        bounds.extend(coords);
        _mapObj.setBounds(bounds);

        (function(marker, p) {
          kakao.maps.event.addListener(marker, 'click', function() {
            if(window._mapOverlay) window._mapOverlay.setMap(null);
            var color = _georaeColor[p.georae] || '#3a7ef6';
            var content = document.createElement('div');
            content.className = 'map-marker-info';
            content.style.cursor = 'pointer';
            content.innerHTML =
              '<div class="mi-title" style="color:'+color+'">No.'+(p.propNo||'-')+' '+p.georae+' / '+p.type+'</div>'+
              '<div class="mi-addr">📍 '+(p.address||'-')+'</div>'+
              (p.price?'<div class="mi-price">💰 '+p.price+'</div>':'')+
              (p.landArea?'<div style="font-size:12px;color:var(--text-muted)">토지 '+p.landArea+'평</div>':'')+
              '<div style="margin-top:8px;text-align:center;font-size:12px;color:'+color+';font-weight:600;">▶ 클릭하면 상세보기</div>';
            content.onclick = function() {
              if(window._mapClickTimer){clearTimeout(window._mapClickTimer);window._mapClickTimer=null;}
              openDetail(p.id);
            };
            window._mapOverlay = new kakao.maps.CustomOverlay({content:content, map:_mapObj, position:marker.getPosition(), yAnchor:1.4, zIndex:3});
          });
        })(marker, p);

        updateMapInfo();
      });
    });
  }, 300);
}

function applyMapFilter() {
  if(!_mapObj) return;
  if(window._mapOverlay){window._mapOverlay.setMap(null);window._mapOverlay=null;}
  var cg=[], ct=[];
  document.querySelectorAll('.map-chk[data-filter="georae"]:checked').forEach(function(c){cg.push(c.getAttribute('data-value'));});
  document.querySelectorAll('.map-chk[data-filter="type"]:checked').forEach(function(c){ct.push(c.getAttribute('data-value'));});
  _mapMarkers.forEach(function(item){
    var sg = cg.length===0 || cg.indexOf(item.p.georae)!==-1;
    var st = ct.length===0 || ct.indexOf(item.p.type)!==-1;
    item.marker.setMap(sg&&st?_mapObj:null);
  });
  updateMapInfo();
}

function updateMapInfo() {
  var cg=[], ct=[];
  document.querySelectorAll('.map-chk[data-filter="georae"]:checked').forEach(function(c){cg.push(c.getAttribute('data-value'));});
  document.querySelectorAll('.map-chk[data-filter="type"]:checked').forEach(function(c){ct.push(c.getAttribute('data-value'));});
  var v = _mapMarkers.filter(function(item){
    return (cg.length===0||cg.indexOf(item.p.georae)!==-1) && (ct.length===0||ct.indexOf(item.p.type)!==-1);
  }).length;
  document.getElementById('mapAllInfo').textContent = '총 '+v+'개 매물 표시 중';
}

function closeMapAll() {
  document.getElementById('mapAllModal').classList.remove('active');
}

// ── 주소 컬럼 리사이즈 ───────────────────
(function(){
  var th, resizer, startX, startW;
  resizer = document.getElementById('addressResizer');
  th = document.getElementById('thAddress');
  resizer.addEventListener('mousedown', function(e) {
    startX = e.pageX;
    startW = th.offsetWidth;
    resizer.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    function onMove(e) {
      var w = Math.max(80, startW + (e.pageX - startX));
      th.style.width = w + 'px';
      th.style.minWidth = w + 'px';
    }
    function onUp() {
      resizer.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    e.preventDefault();
  });
  // 터치 지원
  resizer.addEventListener('touchstart', function(e) {
    startX = e.touches[0].pageX;
    startW = th.offsetWidth;
    function onMove(e) {
      var w = Math.max(80, startW + (e.touches[0].pageX - startX));
      th.style.width = w + 'px';
      th.style.minWidth = w + 'px';
    }
    function onEnd() {
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onEnd);
    }
    document.addEventListener('touchmove', onMove);
    document.addEventListener('touchend', onEnd);
    e.preventDefault();
  });
})();

// ── 시작 ──────────────────────────────────
showLoading('데이터 불러오는 중...');
load();
</script>

<!-- PWA 서비스 워커 등록 -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('service-worker.js')
      .then(function(reg) {
        console.log('SW 등록 완료:', reg.scope);
      })
      .catch(function(err) { console.log('SW 등록 실패:', err); });

    // 새 버전 감지 시 자동 새로고침
    navigator.serviceWorker.addEventListener('message', function(e) {
      if(e.data && e.data.type === 'SW_UPDATED') {
        console.log('새 버전 감지:', e.data.version);
        window.location.reload();
      }
    });
  });
}
</script>
